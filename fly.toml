# Fly.io config - GuanJi Human Design (static site)
# region: sin = Singapore (hkg is deprecated on Fly; alternatives: nrt Tokyo)

app = "guanji-humandesign"
primary_region = "sin"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "suspend"
  auto_start_machines = true
  min_machines_running = 0

  [http_service.concurrency]
    type = "requests"
    soft_limit = 400
    hard_limit = 800

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"

  const lk=lineKW(sun.gate,sun.line), lmz=lineMz(sun.gate,sun.line);
  const rows=c.personality.map((p,idx)=>{ const gv=GATES_KB[p.gate]||{};
    return `<tr><td data-planet="${idx}">${p.glyph} ${esc(ENM?(p.en||p.planet):p.zh)}</td><td data-gate="${p.gate}"><a href="learn.html#gate:${p.gate}" target="_blank" rel="noopener">${p.gate}</a> <span class="pl">.${p.line}</span></td><td>${esc(ENM?(gv.nameEn||''):(gv.name||''))}</td></tr>`;
  }).join('');
  // —— 丰富版：闸门元信息 + 今日爻线(含义+▲曜升/▼曜落极性) + (英文)闸门深读 ——
  const gd=GATE_DETAIL[sun.gate]||{}, ln=(GATE_LINES[sun.gate]&&GATE_LINES[sun.gate][sun.line])||{};
  const meta=[ ENM?((v.hex?v.hex+' ':'')+(v.iching||'')):((v.hex?v.hex+'卦':'')+(v.iching?' · '+v.iching:'')),
               ENM?(v.center||''):(v.centerZh||''), (v.circuit||'') ].filter(Boolean).join(' · ');
  const theme=ENM?(v.keynote||''):(v.theme||v.keynote||'');
  const lTitle=ENM?(ln.te||lk):(ln.tz||lk), lMean=ENM?(ln.me||lmz):(ln.mz||lmz);
  const PLZH={Sun:'太阳',Moon:'月亮',Mercury:'水星',Venus:'金星',Mars:'火星',Jupiter:'木星',Saturn:'土星',Uranus:'天王星',Neptune:'海王星',Pluto:'冥王星',Earth:'地球','North Node':'北交点','South Node':'南交点'};
  const polHtml=(ln.pol||[]).map(po=>{ const up=po.t==='exalted', pl=ENM?po.p:(PLZH[po.p]||po.p);
    return `<div class="dl-pol ${up?'up':'dn'}"><span class="dl-ar">${up?'▲':'▼'}</span><span class="dl-pp">${esc(pl)}</span><span>${esc(ENM?po.e:po.z)}</span></div>`; }).join('');
  const deep=ENM?(gd.en||''):'';   // 深度正文目前仅英文；中文用主题+爻线+极性已足够丰富
  $('daily').innerHTML=`
    <div class="big">
      <div class="sub">${esc(label)}</div>
      <div style="margin-top:5px"><span class="glyph">${v.glyph||'☉'}</span><span class="gname">${ENM?'Gate':'闸门'} ${sun.gate}.${sun.line} · ${esc(nm)}</span>${(ENM?'':v.nameEn)?` <span class="gname-en">${esc(v.nameEn)}</span>`:''}</div>
      ${meta?`<div class="sub">${esc(meta)}</div>`:''}
      ${theme?`<div class="dl-theme">${esc(theme)}</div>`:''}
      <div class="dl-line">
        <div class="dl-lh">${ENM?'Today’s line · Line '+sun.line:'今日爻线 · 第'+sun.line+'爻'}${lTitle?'「'+esc(lTitle)+'」':''}</div>
        ${lMean?`<div class="dl-lm">${esc(lMean)}</div>`:''}
        ${polHtml}
      </div>
      ${deep?`<div class="dl-deep"><div class="dl-dh">${ENM?'Gate in depth':'闸门深读'}</div><p>${esc(deep)}</p></div>`:''}
      <div class="muted" style="margin-top:10px">${ENM?'☉ Sun gate sets the day’s collective theme. Other planets color the field.':'☉ 太阳所在闸门是今日的集体主题，其余行星为今日能量场染色。'}</div>
    </div>`;
  $('dailyTable').innerHTML=`
    <table class="ptable"><tr><th>${ENM?'Planet':'行星'}</th><th>${ENM?'Gate.Line':'闸门.爻'}</th><th>${ENM?'Gate name':'闸门名'}</th></tr>${rows}</table>
    <p class="muted" style="margin-top:8px;font-size:12px">${ENM?'ⓘ Transit (daily) reading — a first-draft GuanJi summary.':'ⓘ 流日解读为观己白话初稿，结合权威资料持续完善。'}</p>`;
}

// 流日盘 → 只保留个性(黑)层：design 置空，按个性闸门两两成通道重算已定义中心
function transitChart(c){
  const pg=new Set(c.personality.map(a=>a.gate));
  const ch=CHANNELS.filter(x=>pg.has(x.gates[0])&&pg.has(x.gates[1]));
  const centers=[...new Set(ch.flatMap(x=>x.centers))];
  return {...c, design:[], definedCenters:centers};
}
let busy=false, cur=null;
async function run(dt){
  if(busy)return; busy=true;
  $('status').textContent=ENM?'⏳ Calculating…':'⏳ 计算中…';
  try{
    const d=dt||new Date();
    let tz='Asia/Shanghai'; try{ tz=Intl.DateTimeFormat().resolvedOptions().timeZone||tz; }catch(e){}
    const input={year:d.getFullYear(),month:d.getMonth()+1,day:d.getDate(),hour:d.getHours(),minute:d.getMinutes(),tz};
    const c=await generateChart(input); cur=c;
    const label=`${input.year}-${String(input.month).padStart(2,'0')}-${String(input.day).padStart(2,'0')} ${String(input.hour).padStart(2,'0')}:${String(input.minute).padStart(2,'0')} · ${tz}`;
    drawWheel(c); drawDaily(c, label);
    // 红框区：此刻流日 bodygraph——只显「当下流日」黑色个性闸门（去掉 88°设计的红色层），
    // 中心按个性闸门两两成通道重算，保持严谨
    const tg=$('tgraph');
    if(tg && window.HDRender){ try{ HDRender.bodygraph(tg, transitChart(c)); }catch(e){ console.error(e); } }
    $('tgTitle').textContent = ENM?'This transit · Bodygraph':'此刻流日 · 人类图';
    $('tgNote').textContent = ENM?'Highlighted gates = energies active in the sky right now; click a gate on the wheel above for its entry.':'高亮闸门＝此刻天空正在激活的能量；点上方轮盘的闸门可查词条。';
    $('status').textContent='';
  }catch(e){ $('status').textContent=(ENM?'Error: ':'出错：')+(e.message||e); console.error(e); }
  busy=false;
}
// 悬停闸门 → 浮窗显示 闸门/星座/当下落入行星（移出即隐藏，移到下一门即切换）
const gtip=document.createElement('div'); gtip.className='gtip'; gtip.hidden=true; document.body.appendChild(gtip);
function gateTipHTML(g){
  const v=GATES_KB[g]||{}, i=GATE_ORDER.indexOf(+g);
  const lon=((WHEEL_START+i*GATE_ARC+GATE_ARC/2)%360+360)%360, s=Math.floor(lon/30);   // 用闸门中点定星座，与轮盘绘制一致（修交界门错指）
  const nm=ENM?(v.nameEn||v.name||''):(v.name||'');
  const sign=ENM?SIGNS_EN[s]:SIGNS[s];
  const iching=ENM?(v.iching||''):((v.hex?v.hex+'卦':'')+(v.iching?' · '+v.iching:''));
  const ps=cur?cur.personality.filter(p=>String(p.gate)===String(g)):[];
  const here=ps.length?`<div class="gt-here">${ENM?'Now here: ':'此刻在此：'}${ps.map(p=>`${p.glyph} ${ENM?(p.en||p.planet):p.zh} .${p.line}`).join('、')}</div>`:'';
  const L=GATE_LINES[g], lt=L&&ps.length&&L[ps[0].line]?(ENM?L[ps[0].line].te:L[ps[0].line].tz):'';
  return `<div class="gt-h"><span class="gt-gl">${v.glyph||''}</span>${ENM?'Gate':'闸门'} ${g} · ${esc(nm)}</div>`
    +`<div class="gt-sub">${ENM?'I Ching: ':'易经：'}${esc(iching)} · ${SIGN_GLYPH[s]} ${esc(sign)}</div>`
    +`<div class="gt-sub">${ENM?'Center: ':'中心：'}${esc(ENM?(v.center||''):(v.centerZh||''))}${v.circuit&&!ENM?' · '+esc(v.circuit):''}</div>`
    +here+(lt?`<div class="gt-sub">${ENM?'Line ':'第'}${ps[0].line}${ENM?'':'爻'} · ${esc(lt)}</div>`:'');
}
function planetTipHTML(idx){
  const p=cur&&cur.personality[idx]; if(!p) return '';
  const kb=PLANET_KB[p.glyph]||{}, gv=GATES_KB[p.gate]||{};
  const nm=ENM?(p.en||p.planet||''):(p.zh||'');
  return `<div class="gt-h"><span class="gt-gl">${p.glyph}</span>${esc(nm)}</div>`
    +`<div class="gt-sub">${esc(ENM?(kb.dEn||''):(kb.dZh||''))}</div>`
    +`<div class="gt-here">${ENM?'Now in: ':'此刻落于：'}${ENM?'Gate':'闸门'} ${p.gate}.${p.line}${(gv.name||gv.nameEn)?' · '+esc(ENM?(gv.nameEn||''):(gv.name||'')):''}</div>`;
}
function signTipHTML(s){
  const info=SIGN_INFO[s]||{}, nm=ENM?SIGNS_EN[s]:SIGNS[s];
  const ps=cur?cur.personality.filter(p=>Math.floor((((p.lon%360)+360)%360)/30)===s):[];
  const here=ps.length?`<div class="gt-here">${ENM?'Now here: ':'此刻在此：'}${ps.map(p=>p.glyph).join(' ')}</div>`:'';
  return `<div class="gt-h"><span class="gt-gl">${SIGN_GLYPH[s]}</span>${esc(nm)}</div>`
    +`<div class="gt-sub">${esc(info.date||'')} · ${esc(ENM?((info.elEn||'')+' sign'):(info.elZh||''))}</div>`
    +`<div class="gt-sub">${esc(ENM?(info.dEn||''):(info.dZh||''))}</div>`+here;
}
function moveTip(e){
  const tg=e.target.closest&&e.target.closest('[data-planet],[data-sign],[data-gate]');
  if(!tg){ gtip.hidden=true; return; }
  gtip.innerHTML = tg.hasAttribute('data-planet') ? planetTipHTML(+tg.getAttribute('data-planet'))
    : tg.hasAttribute('data-sign') ? signTipHTML(+tg.getAttribute('data-sign'))
    : gateTipHTML(tg.getAttribute('data-gate'));
  gtip.hidden=false;
  const pad=14, w=gtip.offsetWidth, h=gtip.offsetHeight;
  let x=e.clientX+pad, y=e.clientY+pad;
  if(x+w>innerWidth-8) x=e.clientX-w-pad; if(y+h>innerHeight-8) y=e.clientY-h-pad;
  gtip.style.left=x+'px'; gtip.style.top=y+'px';
}
$('wheel').addEventListener('mousemove',moveTip);
$('wheel').addEventListener('mouseleave',()=>{ gtip.hidden=true; });
// 行星表：闸门.爻 / 行星 悬停同样出提示（复用 moveTip 委托）
$('dailyTable').addEventListener('mousemove',moveTip);
$('dailyTable').addEventListener('mouseleave',()=>{ gtip.hidden=true; });
// 点击：闸门/卦象 → 该闸门词条；行星 → 其所在闸门词条
$('wheel').addEventListener('click',e=>{
  const gt=e.target.closest&&e.target.closest('[data-gate]'); if(gt){ window.open('learn.html#gate:'+gt.getAttribute('data-gate'),'_blank','noopener'); return; }
  const pl=e.target.closest&&e.target.closest('[data-planet]'); if(pl&&cur){ const p=cur.personality[+pl.getAttribute('data-planet')]; if(p) window.open('learn.html#gate:'+p.gate,'_blank','noopener'); }
});
$('now').onclick=()=>{ $('dt').value=''; run(); };
$('dt').onchange=()=>{ const v=$('dt').value; run(v?new Date(v):null); };
run();
</script>

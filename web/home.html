<style>
  /* 独立首页/品牌落地页。视觉沿用开屏(.home-*)语言；中央放「此刻流日」Bodygraph。 */
  body{margin:0}
  header{display:flex;justify-content:flex-end;align-items:center;gap:8px;padding:14px 18px;max-width:880px;margin:0 auto;min-height:30px;flex-wrap:wrap}
  .home{min-height:calc(100vh - 64px);display:flex;flex-direction:column;align-items:center;text-align:center;padding:8px 22px 56px;box-sizing:border-box}
  .home-logo{width:60px;height:60px;animation:spbreath 2.6s ease-in-out infinite}
  @keyframes spbreath{0%,100%{transform:scale(1);opacity:.96}50%{transform:scale(1.05);opacity:1}}
  .home-t{font-size:25px;font-weight:700;letter-spacing:.08em;margin-top:10px;color:var(--ink)}
  .home-t span{color:var(--li)}
  .home-s{font-size:12px;color:var(--sub);letter-spacing:.24em;margin-top:6px}
  html[lang="en"] .home-s{display:none}  /* EN 标题已含 Human Design，隐藏副标避免重复 */
  /* 此刻流日 Bodygraph（中央主视觉） */
  .home-glabel{font-size:12.5px;color:var(--li);letter-spacing:.16em;margin-top:20px;font-weight:600}
  .home-gwrap{width:100%;max-width:300px;margin:6px auto 0;min-height:120px;display:flex;align-items:center;justify-content:center}
  .home-gwrap svg{width:100%;height:auto;display:block}
  .home-gload{font-size:12px;color:var(--sub);letter-spacing:.1em}
  .home-intro{font-size:13.5px;line-height:1.9;color:var(--sub);margin:18px auto 0;max-width:344px;text-align:justify}
  .home-cta{display:inline-block;margin-top:22px;background:var(--li);color:#fff;text-decoration:none;border-radius:999px;padding:13px 34px;font-size:16px;font-weight:650;letter-spacing:.04em;box-shadow:0 8px 22px rgba(0,0,0,.18);transition:transform .15s,box-shadow .15s}
  .home-cta:hover{transform:translateY(-1px)}
  .home-cta:active{transform:translateY(1px)}
  .home-links{margin-top:18px;display:flex;gap:18px;flex-wrap:wrap;justify-content:center}
  .home-links a{font-size:13px;color:var(--li);text-decoration:none;border-bottom:1px solid transparent}
  .home-links a:hover{border-bottom-color:var(--li)}
  .home-foot{margin-top:26px;font-size:11.5px;color:var(--sub);line-height:1.8}
  .home-foot .z{color:var(--li);font-weight:600;letter-spacing:.04em}
  .home-foot .tag{color:var(--gold,#C09A5E);letter-spacing:.04em;margin-top:5px}
  @media (min-width:1024px){ .home-gwrap{max-width:340px} .home-t{font-size:28px} .home-intro{font-size:14.5px;max-width:380px} }
</style>
</head>

  <p class="home-intro" id="hIntro"></p>
  <a class="home-cta" id="hCta" href="index.html"></a>

<script src="i18n.js"></script>
<script>
(function(){
  var L=(window.HDI18N&&HDI18N.lang)||'zh-Hans';
  var D={
    'zh-Hans':{ t:'观<span>己</span> · 人类图', glabel:'此刻流日 · 人类图', intro:'人类图融合易经、占星、脉轮与卡巴拉，用你出生的那一刻，绘成一张专属能量蓝图——照见你天生的决策方式与生命节奏。', cta:'照见自己 ›', l:['排盘','流日','梦图','学习·知识库','名人'], z:'再遇行者 · 观己', tag:'认识自己 · 自我探索 · 观己修心 · 知行合一', load:'正在绘制此刻的天象…' },

    'en':{ t:'GuanJi · Human Design', glabel:'TODAY’S TRANSIT · HUMAN DESIGN', intro:'Human Design weaves together the I Ching, astrology, the chakras and the Kabbalah — turning the moment you were born into a personal energy blueprint that reveals how you’re built to decide and move through life.', cta:'See Yourself ›', l:['Chart','Transit','Dream','Learn','Celebrities'], z:'Zai Yu Xing Zhe · GuanJi', tag:'Know Yourself · Self-Discovery · Inner Cultivation', load:'Drawing the current sky…' }
  };
  var d=D[L]||D['zh-Hans'];

  document.getElementById('hL2').textContent=d.l[1];
  document.getElementById('hL5').textContent=d.l[2];   // 梦图(新)
  document.getElementById('hL3').textContent=d.l[3];

  document.getElementById('hTag').textContent=d.tag;

<script type="module">
// 此刻流日 Bodygraph：取系统当前时间 + 系统时区，算盘后渲染到 #hGraph（异步，文字先出，不阻塞首屏）
import { generateChart } from '/src/chart.js';
(async function(){
  try{
    let tz='Asia/Shanghai'; try{ tz=Intl.DateTimeFormat().resolvedOptions().timeZone||tz; }catch(e){}
    const n=new Date();
    const input={year:n.getFullYear(),month:n.getMonth()+1,day:n.getDate(),hour:n.getHours(),minute:n.getMinutes(),tz,ephemerisMode:'MOSEPH',nodeType:'TRUE'};
    const c=await generateChart(input);
    const svg=document.getElementById('hGraph'), load=document.getElementById('hGLoad');
    if(window.HDRender&&svg){ HDRender.bodygraph(svg, c); svg.removeAttribute('hidden'); if(load) load.style.display='none'; }   // SVG 的 hidden 非 IDL 属性，必须 removeAttribute 否则图 0×0
  }catch(e){ const load=document.getElementById('hGLoad'); if(load) load.style.display='none'; console.error('home transit chart failed', e); }
})();
</script>

<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>人类图 · 知识库 · 观己</title>
<link rel="stylesheet" href="hd.css" />
</head>
<body>
<div class="wrap">
  <header>
    <div class="brand">观<span class="li">己</span> · 人类图 <span class="sub">知识库</span></div>
  </header>
  <div class="tabs">
    <a class="tab" href="index.html">排盘</a>
    <a class="tab" href="history.html">记录</a>
    <a class="tab" href="solve.html">反推</a>
    <a class="tab" href="connect.html">合盘</a>
    <a class="tab on" href="learn.html">学习 · 知识库</a>
  </div>

  <input id="q" class="kb-search" placeholder="搜索：类型 / 权威 / 闸门号或卦名 / 通道 / 中心…（如「41」「损」「情绪」「投射」）" />
  <div class="tabs" id="cats"></div>
  <div id="detail"></div>
  <div class="kb-grid" id="grid"></div>
  <p class="muted" id="note" style="margin-top:22px"></p>
</div>

<script src="i18n.js"></script>
<script type="module">
import { TYPES, AUTHORITIES, LINES, PROFILES, DEFINITION_KB, CENTERS_KB, GATES_KB, CHANNELS_KB, PHS_KB, PHS_TONES_KB, KB_NOTE } from '/src/hd-knowledge.js';
import { EN_KB } from '/src/hd-book-data.js';
const $=s=>document.querySelector(s);
const esc=s=>String(s).replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));
// EN 模式：英文独占（不露中文）；繁/简由 i18n 全站处理
const ENM = window.HDI18N && window.HDI18N.lang==='en';
const eng = t => ENM && t ? `<div class="gloss" data-noi18n>${t}</div>` : '';
const LINE_EN={1:['Investigator','Introspective foundation — needs to study and know.'],2:['Hermit','Natural talent, called out of aloneness.'],3:['Martyr','Trial and error; resilience through what does not work.'],4:['Opportunist','Influence moves through network and friendship.'],5:['Heretic','Carries projections; delivers practical, universal solutions.'],6:['Role Model','Three life phases, becoming a living example.']};
const DEF_EN={'Single':'All defined centers form one continuous connection — self-contained and consistent.','Split':'Two separate areas of definition; specific people feel like the bridge.','Triple Split':'Three areas; integration comes through varied environments and patience.','Quadruple Split':'Four areas; fixed, complex processing that benefits from stable routine.','None':'No definition (Reflector) — a fluid, sampling presence shaped by place and people.'};
const ANGLE_EN={'右角度':'Right Angle','左角度':'Left Angle','并列':'Juxtaposition'};
const CENTER_EN={Head:'Head',Ajna:'Ajna',Throat:'Throat',G:'G (Identity)',Heart:'Heart (Ego)',Sacral:'Sacral',SolarPlexus:'Solar Plexus',Spleen:'Spleen',Root:'Root'};
const CIRCUIT_EN={'整合型':'Integration','个体人·觉知':'Individual (Knowing)','个体人·中央':'Individual (Centering)','社会人·理解-逻辑':'Collective (Logic)','社会人·感知-抽象':'Collective (Sensing)','家族人·防护':'Tribal (Defense)','家族人·意志力':'Tribal (Ego)'};
const cEN=s=>CIRCUIT_EN[s]||s;

// 统一索引
const ALL=[];
for(const [k,v] of Object.entries(TYPES)) ALL.push({cat:'type',key:k,name:ENM?k:v.zh,sub:ENM?((EN_KB.types[k]||{}).strategy||''):v.strategy,s:`${k}${v.zh}${v.strategy}类型`});
for(const [k,v] of Object.entries(AUTHORITIES)) ALL.push({cat:'authority',key:k,name:ENM?k+' Authority':v.zh,sub:ENM?'Inner Authority':'内在权威',s:`${k}${v.zh}权威`});
for(const [k,v] of Object.entries(PROFILES)) ALL.push({cat:'profile',key:k,name:k,sub:ENM?(ANGLE_EN[v.angle]||''):v.angle,s:`${k}${v.desc}角色profile${EN_KB.profiles[k]||''}`});
for(const [k,v] of Object.entries(LINES)) ALL.push({cat:'line',key:k,name:ENM?`Line ${k} · ${LINE_EN[k][0]}`:`第${k}爻 ${v.name}`,sub:ENM?'':v.name,s:`${k}爻${v.name}${v.desc}${LINE_EN[k][0]}`});
for(const [k,v] of Object.entries(CENTERS_KB)) ALL.push({cat:'center',key:k,name:ENM?CENTER_EN[k]:v.zh,sub:ENM?'':v.type,s:`${k}${v.zh}${v.theme}中心`});
for(const [k,v] of Object.entries(DEFINITION_KB)) ALL.push({cat:'definition',key:k,name:ENM?k:v.zh,sub:ENM?'Definition':'定义',s:`${k}${v.zh}定义`});
for(const [k,v] of Object.entries(CHANNELS_KB)) ALL.push({cat:'channel',key:k,name:`${k} ${ENM?(v.en||v.zh):v.zh}`,sub:ENM?(v.keynote||v.centers.join('–')):v.centers.join('–'),s:`${k}${v.zh}${v.en}${v.theme}${v.circuit}通道`});
for(const [k,v] of Object.entries(GATES_KB)) ALL.push({cat:'gate',key:k,name:`${v.glyph} ${k}·${ENM&&v.nameEn?v.nameEn:(v.name||v.hex)}`,sub:ENM?(v.keynote||v.theme):v.theme,s:`${k}${v.hex}${v.iching}${v.name}${v.alias}${v.nameEn}${v.circuit}${v.theme}${v.centerZh}闸门门`});
for(const [k,v] of Object.entries(PHS_KB)) ALL.push({cat:'phs',key:k,name:v.title,sub:v.zh,s:`phs变量箭头variable${k}${v.title}${v.zh}${v.colors.map(c=>c.base.join('')+c.l.join('')+c.r.join('')).join('')}`});

const CATS=[['type','类型'],['authority','内在权威'],['profile','人生角色'],['line','六爻'],['center','九大中心'],['channel','36通道'],['gate','64闸门'],['definition','定义'],['phs','PHS 四箭头']];
let curCat='type', curTerm='';

// 分类导航
$('#cats').innerHTML=CATS.map(([id,n])=>`<span class="tab" data-cat="${id}">${n}</span>`).join('');
$('#cats').onclick=e=>{const c=e.target.dataset.cat;if(!c)return;curCat=c;curTerm='';$('#q').value='';$('#detail').innerHTML='';location.hash='';renderGrid();};

$('#q').oninput=()=>{curTerm=$('#q').value.trim().toLowerCase();renderGrid();};

function renderGrid(){
  for(const t of $('#cats').children) t.classList.toggle('on', !curTerm && t.dataset.cat===curCat);
  const items = curTerm ? ALL.filter(x=>x.s.toLowerCase().includes(curTerm)) : ALL.filter(x=>x.cat===curCat);
  $('#grid').innerHTML = items.map(x=>`<div class="kb-cell" data-cat="${x.cat}" data-key="${esc(x.key)}"><div class="n">${esc(x.name)}</div><div class="t">${esc(x.sub||'')}</div></div>`).join('') || '<p class="muted">无匹配</p>';
}
$('#grid').onclick=e=>{const c=e.target.closest('.kb-cell');if(!c)return;openDetail(c.dataset.cat,c.dataset.key);};

function tag(t){return `<span class="tag">${esc(t)}</span>`;}
function detailHTML(cat,key){
  if(cat==='type'){const v=TYPES[key];const e=EN_KB.types[key]||{};
    if(ENM) return `<h2 data-noi18n>${esc(key)}</h2><div data-noi18n>${e.keynote?`<div class="gloss">${esc(e.keynote)}</div>`:''}<div class="gloss"><b>Strategy:</b> ${esc(e.strategy||'')}<br><b>Signature:</b> ${esc(e.signature||'')}　<b>Not-Self:</b> ${esc(e.notSelf||'')}</div></div>`;
    return `<h2>${v.zh} <span class="sub">${key}</span></h2>${tag(v.pct)}${tag('光环：'+v.aura)}<div class="gloss">${v.desc}</div><div><b>策略</b>：${v.strategy}　<b>签名</b>：${v.signature}　<b>非自己</b>：${v.notSelf}</div><div class="gloss">💡 ${v.tip}</div>`;}
  if(cat==='authority'){const v=AUTHORITIES[key];const e=EN_KB.authorities[key]||{};
    if(ENM) return `<h2 data-noi18n>${esc(key)} Authority</h2><div data-noi18n class="gloss">${esc(e.keynote||e.name||'Inner authority — decision-making by design.')}</div>`;
    return `<h2>${v.zh}</h2><div class="gloss">${v.desc}</div><div class="gloss">💡 ${v.tip}</div>`;}
  if(cat==='profile'){const v=PROFILES[key];const e=EN_KB.profiles[key];const [a,b]=key.split('/');
    if(ENM) return `<h2 data-noi18n>Profile ${esc(key)}</h2><div data-noi18n>${tag(ANGLE_EN[v.angle]||'')}<div class="gloss">${esc(typeof e==='string'?e:(e&&(e.keynote||e.name))||'')}</div><div class="lines"><div><b>Line ${a} · ${LINE_EN[a][0]}</b>: ${esc(LINE_EN[a][1])}</div><div><b>Line ${b} · ${LINE_EN[b][0]}</b>: ${esc(LINE_EN[b][1])}</div></div></div>`;
    return `<h2>人生角色 ${key}</h2>${tag(v.angle+'交叉')}<div class="gloss">${v.desc}</div><div class="lines"><div><b>第${a}爻 ${LINES[a].name}</b>：${LINES[a].desc}</div><div><b>第${b}爻 ${LINES[b].name}</b>：${LINES[b].desc}</div></div>`;}
  if(cat==='line'){const v=LINES[key];
    if(ENM) return `<h2 data-noi18n>Line ${esc(key)} · ${LINE_EN[key][0]}</h2><div class="gloss" data-noi18n>${esc(LINE_EN[key][1])}</div>`;
    return `<h2>第${key}爻 · ${v.name}</h2><div class="gloss">${v.desc}</div>`;}
  if(cat==='center'){const v=CENTERS_KB[key];const e=EN_KB.centers[key]||{};
    if(ENM) return `<h2 data-noi18n>${CENTER_EN[key]||key} Center</h2><div class="gloss" data-noi18n>${esc(e.keynote||e.name||'')}</div>`;
    return `<h2>${v.zh}</h2>${tag(v.type)}${tag(v.theme)}<div class="gloss"><b>已定义</b>：${v.defined}</div><div class="gloss"><b>开放</b>：${v.open}</div>`;}
  if(cat==='definition'){const v=DEFINITION_KB[key];
    if(ENM) return `<h2 data-noi18n>${esc(key)} Definition</h2><div class="gloss" data-noi18n>${esc(DEF_EN[key]||'')}</div>`;
    return `<h2>${v.zh}</h2><div class="gloss">${v.desc}</div>`;}
  if(cat==='channel'){const v=CHANNELS_KB[key];
    if(ENM) return `<h2 data-noi18n>${v.key} · ${esc(v.en)}</h2><div data-noi18n>${tag(v.centers.map(c=>CENTER_EN[c]||c).join(' – '))}${v.circuit?tag(cEN(v.circuit)):''}${v.keynote?`<div class="gloss">${esc(v.keynote)}</div>`:''}<div class="muted">Gates ${v.gates[0]} &amp; ${v.gates[1]}</div></div>`;
    return `<h2>${v.key} ${v.zh.endsWith('通道')?v.zh:v.zh+'通道'} <span class="sub">${v.en}</span></h2>${tag(v.centers.join(' – '))}${v.circuit?tag('回路：'+v.circuit):''}${v.keyline?tag('关键句：'+v.keyline):''}<div class="gloss">${v.theme}</div>${v.keynote?`<div class="muted">Keynote: ${v.keynote}</div>`:''}<div class="muted">连接闸门 ${v.gates[0]} 与 ${v.gates[1]}</div>`;}
  if(cat==='gate'){const v=GATES_KB[key];
    if(ENM) return `<h2 data-noi18n><span style="font-size:34px;vertical-align:-4px;margin-right:6px">${v.glyph}</span>Gate ${v.gate}${v.nameEn?` · ${esc(v.nameEn)}`:''}</h2><div data-noi18n>${tag(CENTER_EN[v.center]||v.center)}${tag('Hexagram '+v.gate+' · '+esc(v.iching))}${v.circuit?tag(cEN(v.circuit)):''}${v.keynote?`<div class="gloss">${esc(v.keynote)}</div>`:''}</div>`;
    return `<h2><span style="font-size:34px;vertical-align:-4px;margin-right:6px">${v.glyph}</span>${v.gate} 号闸门${v.name?` · ${v.name}`:''} <span class="sub">${v.nameEn||v.iching}</span></h2>${tag('所在：'+v.centerZh)}${tag(v.hex+'卦')}${v.circuit?tag('回路：'+v.circuit):''}${v.alias?tag('别名：'+v.alias):''}<div class="gloss">${v.theme}</div>${v.keynote?`<div class="muted">Keynote: ${v.keynote}</div>`:''}`;}
  if(cat==='phs'){const v=PHS_KB[key];const tones=PHS_TONES_KB[v.tones];
    if(ENM){const qEN=q=>q?String(q).split(/[一-鿿（]/)[0].trim():'';
      let h=`<h2 data-noi18n>${esc(v.title.split(' ')[0])}</h2><div data-noi18n>`;
      if(v.side) h+=tag('◀ '+v.side.l[0])+tag('▶ '+v.side.r[0]);
      h+=`<div class="muted" style="margin:8px 0 4px">Tones: ${tones.map((t,i)=>`${i+1} ${t[0]}`).join(' · ')} (1-3 → ◀ left / 4-6 → ▶ right)</div>`;
      h+=v.colors.map((c,i)=>`<div class="gloss"><b>Color ${i+1} · ${c.base[0]}</b>${c.q?`<div class="muted">${esc(qEN(c.q))}</div>`:''}<div style="margin-top:4px">◀ <b>${c.l[0]}</b>　▶ <b>${c.r[0]}</b></div></div>`).join('');
      return h+'</div>';}
    let h=`<h2>${v.title} <span class="sub">${v.zh}</span></h2>${tag('来源：'+v.src)}`;
    if(v.side) h+=tag('◀ '+v.side.l.join(' '))+tag('▶ '+v.side.r.join(' '));
    h+=`<div class="muted" style="margin:8px 0 4px">Tone：${tones.map((t,i)=>`${i+1} ${t[1]}`).join(' · ')}（Tone 1-3 → ◀ 左 / Tone 4-6 → ▶ 右）</div>`;
    h+=v.colors.map((c,i)=>`<div class="gloss"><b>Color ${i+1} · ${c.base[0]} ${c.base[1]}</b>${c.q?`<div class="muted">${c.q}</div>`:''}${c.shared?`<div>${c.shared}</div>`:''}<div style="margin-top:4px">◀ <b>${c.l[0]} ${c.l[1]}</b>：${c.ldesc}</div><div>▶ <b>${c.r[0]} ${c.r[1]}</b>：${c.rdesc}</div></div>`).join('');
    return h;}
  return '';
}
function openDetail(cat,key){
  const html=detailHTML(cat,key);
  $('#detail').innerHTML = html ? `<div class="kb-detail">${html}</div>` : '';
  if(html) $('#detail').scrollIntoView({behavior:'smooth',block:'nearest'});
}

// 深链：#type:Generator / #gate:41 / #profile:1/3 / #channel:30-41 ...
function fromHash(){
  const m=location.hash.slice(1);
  if(!m)return false;
  const i=m.indexOf(':');if(i<0)return false;
  const cat=m.slice(0,i), key=decodeURIComponent(m.slice(i+1));
  if(ALL.some(x=>x.cat===cat&&String(x.key)===key)){ curCat=cat; renderGrid(); openDetail(cat,key); return true; }
  return false;
}
window.addEventListener('hashchange',fromHash);

$('#note').textContent='ⓘ '+(ENM?'GuanJi-voice summaries; EN terms per Ra/Jovian standards.':KB_NOTE);
if(!fromHash()) renderGrid();
</script>
</body>
</html>

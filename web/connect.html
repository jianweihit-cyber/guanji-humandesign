<meta charset="utf-8" />

<style>
  .pickrow{display:flex;gap:10px;flex-wrap:wrap;align-items:flex-end;margin-top:10px}
  .pickrow select{padding:8px;border:1px solid var(--border);border-radius:10px;min-width:180px;font-size:14px;background:var(--card)}
  .plist{display:flex;flex-direction:column;gap:6px;margin-top:10px}
  .plist label{display:flex;align-items:center;gap:8px;background:var(--card);border:1px solid var(--border);border-radius:10px;padding:8px 10px;font-size:14px;cursor:pointer}
  .plist .sub{color:var(--sub);font-size:12px}
  .cat{margin-top:14px}
  .cat h4{margin:0 0 6px;font-size:14px}
  .cat .hint{font-size:12px;color:var(--sub);margin-left:6px;font-weight:400}
  table.pg{width:100%;border-collapse:collapse;background:var(--card);border:1px solid var(--border);border-radius:12px;overflow:hidden;margin-top:10px}
  .pg th,.pg td{padding:6px 8px;border-bottom:1px solid #F3ECDF;font-size:13px;text-align:left}
  .pg th{background:var(--surface-2);color:var(--sub)}
  .pg td.gap{color:#B3433A;font-weight:700}
  .duo{display:flex;gap:18px;flex-wrap:wrap;align-items:flex-start}
  .duo .graph{flex:1 1 320px;min-width:280px}
  .duo .side{flex:1 1 300px;min-width:260px}
  .savebar{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin:10px 0 2px}
  .savemsg{font-size:12.5px;color:var(--sub)}
  /* 保存模态框 */
  .modal{position:fixed;inset:0;z-index:300;background:rgba(40,26,8,.34);display:flex;align-items:center;justify-content:center;padding:18px}
  .modal-box{background:var(--card);border:1px solid var(--border);border-radius:16px;max-width:380px;width:100%;padding:18px 18px 16px;box-shadow:0 14px 40px rgba(60,38,8,.22)}
  .modal-box h3{margin:0 0 4px;font-size:16px}
  .modal-box .mhint{font-size:12px;color:var(--sub);margin:0 0 10px;line-height:1.5}
  .modal-box input{width:100%;box-sizing:border-box;padding:9px 11px;font-size:16px;border:1px solid var(--border);border-radius:10px;background:var(--card);color:var(--ink)}
  .modal-box .mbtns{display:flex;gap:8px;justify-content:flex-end;margin-top:12px;flex-wrap:wrap}
  /* Penta 成员色板 + 知识段 */
  .pcolor{display:flex;flex-wrap:wrap;gap:10px;margin-top:8px;font-size:12.5px}
  .pcolor .lg{display:inline-flex;align-items:center;gap:6px;cursor:pointer;padding:3px 9px;border-radius:999px;border:1px solid transparent;user-select:none}
  .pcolor .lg:hover{background:var(--card)}
  .pcolor .lg.on{border-color:var(--li);background:var(--card);font-weight:600}
  .pcolor .sw{width:22px;height:8px;border-radius:3px;display:inline-block}
  .pkb{margin-top:16px;border-top:1px solid var(--border);padding-top:12px}
  .pkb h4{margin:0 0 6px;font-size:14px}
  .pkb .intro{font-size:13px;color:var(--sub);line-height:1.7;margin:0 0 10px}
  .pkb .fns{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:8px}
  .pkb .fn{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:9px 11px}
  .pkb .fn .t{font-weight:700;font-size:13px}
  .pkb .fn .g{font-size:11.5px;color:var(--sub);margin-top:1px}
  .pkb .fn .d{font-size:12px;color:var(--ink);margin-top:4px;line-height:1.55}
</style>

<body>
<div class="wrap">
  <header>
    <div class="brand"><img src="logo.svg" class="brandlogo" alt="" />观<span class="li">己</span> · 人类图 <span class="sub">合盘 · Penta</span></div>
  </header>
  <div class="tabs">
    <a class="tab" href="home.html">首页</a>
    <a class="tab" href="index.html">排盘</a>
    <a class="tab" href="mandala.html">流日</a>
    <a class="tab" href="history.html">记录</a>
    <a class="tab" href="solve.html">反推</a>
    <a class="tab on" href="connect.html">合盘</a>
    <a class="tab" href="learn.html">学习 · 知识库</a>
    <a class="tab" href="celebs.html">名人</a>
  </div>

  <div class="tabs" id="mode">
    <span class="tab on" data-m="conn">合盘（2人）</span>
    <span class="tab" data-m="penta">Penta（3-5人）</span>
  </div>

  <div class="form" id="connForm">
    <div class="pickrow">
      <div class="field"><label>人 A（墨）</label><select id="selA"></select></div>
      <div class="field"><label>人 B（朱）</label><select id="selB"></select></div>
      <button class="btn" id="goConn">生成合盘</button>
      <button class="btn ghost" id="connSave" hidden>💾 保存此合盘</button><span class="savemsg" id="connSaveMsg"></span>
    </div>
    <div class="status" id="connSt"></div>
    <div id="connLinks"></div>
  </div>

  <div class="form" id="pentaForm" hidden>
    <p class="muted" id="pentaHint" data-noi18n style="margin:6px 2px 0;font-size:13px">勾选 3-5 人（来自「记录」）。Penta 只看 喉咙-G-荐骨 纵列的 6 条通道 / 12 个闸门：小组场域的角色与缺口。</p>
    <div class="plist" id="plist"></div>
    <div class="pickrow"><button class="btn" id="goPenta">生成 Penta</button><button class="btn ghost" id="pentaSave" hidden>💾 保存此 Penta</button><span class="status" id="pcount" data-noi18n></span><span class="status" id="pentaSt"></span><span class="savemsg" id="pentaSaveMsg"></span></div>
    <div id="pentaLinks"></div>
  </div>

  <div id="out" style="margin-top:14px"></div>
</div>

<script type="importmap">
{ "imports": { "swisseph-wasm": "/node_modules/swisseph-wasm/src/swisseph.js" } }
</script>
<script src="hd-render.js"></script>
<script src="hd-store.js"></script>

<script type="module">
import { generateChart } from '/src/chart.js';
import { connection, penta, unionGates, PENTA_CHANNELS, PENTA_GATES, PENTA_GATE_INFO, PENTA_INTRO } from '/src/hd-connect.js';
const $=id=>document.getElementById(id);
const ENM = window.HDI18N && window.HDI18N.lang==='en';
const HANT = window.HDI18N && window.HDI18N.lang==='zh-Hant';
const tw=zh=>HANT&&window.HDI18N.s2t?window.HDI18N.s2t(zh):zh;   // JS 动态简体串的繁體转换（data-noi18n 节点不会自动繁化）
const esc=s=>String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const recs=HDStore.all();
const homeLink = ENM?'<a href="index.html">the Chart page</a>':'<a href="index.html">「排盘」页</a>';

// 选人控件（空状态不销毁 #goConn/#goPenta，避免后续绑定抛错使整个脚本中断 → Penta 按钮失灵）
const opt=r=>`<option value="${r.id}">${esc(r.name)} · ${esc(r.sum.type)} ${esc(r.sum.profile)}</option>`;
if(recs.length<2){
  $('connSt').innerHTML = ENM?`Need at least 2 saved charts — generate & save on ${homeLink} first.`
                             :`需要至少 2 条记录——先去${homeLink}生成并保存。`;
  $('goConn').disabled=true; $('goConn').style.opacity=.5;
} else { $('selA').innerHTML=recs.map(opt).join(''); $('selB').innerHTML=recs.map(opt).join(''); if(recs[1]) $('selB').value=recs[1].id; }
$('plist').innerHTML = recs.length
  ? recs.map(r=>`<label><input type="checkbox" value="${r.id}" /> <b>${esc(r.name)}</b> <span class="sub">${esc(r.sum.type)} ${esc(r.sum.profile)}</span></label>`).join('')
  : (ENM?`<p class="muted">No saved charts yet — generate on ${homeLink} first.</p>`:`<p class="muted">暂无记录——先去${homeLink}生成并保存。</p>`);

// Penta 数量检查：3–5 人才能排；勾第 6 个自动拦下（6 人以上属 WA），并实时提示已选数
function updatePentaCount(e){
  const boxes=[...document.querySelectorAll('#plist input')];
  let checked=boxes.filter(b=>b.checked);
  if(checked.length>5 && e && e.target && e.target.checked){ e.target.checked=false; checked=boxes.filter(b=>b.checked);
    $('pentaSt').textContent=ENM?'Max 5 — a Penta is 3–5 people (6+ becomes a WA)':tw('最多 5 人——Penta 为 3-5 人（6 人及以上属 WA）'); }
  else $('pentaSt').textContent='';
  const n=checked.length, ok=n>=3&&n<=5;
  $('pcount').textContent = n? (ENM?`${n} selected · need 3–5`:tw(`已选 ${n} 人 · 需 3-5`)) : '';
  $('pcount').style.color = ok?'var(--li)':'var(--sub)';
  $('goPenta').disabled=!ok; $('goPenta').style.opacity=ok?1:.5;
}
$('plist').addEventListener('change',updatePentaCount); updatePentaCount(); renderLinks();
$('connSave').textContent = ENM?'💾 Save this connection':'💾 保存此合盘';
$('pentaSave').textContent = ENM?'💾 Save this Penta':'💾 保存此 Penta';

$('mode').onclick=e=>{const t=e.target.closest('[data-m]');if(!t)return;
  for(const x of $('mode').children)x.classList.toggle('on',x===t);
  $('connForm').hidden=t.dataset.m!=='conn'; $('pentaForm').hidden=t.dataset.m!=='penta'; $('out').innerHTML='';
  $('connSave').hidden=true; $('pentaSave').hidden=true;
  $('connSaveMsg').textContent=''; $('pentaSaveMsg').textContent='';};   // 清上次保存成功提示，避免切回后误导

const charts={}; // id → chart 缓存
async function chartOf(id){ if(charts[id])return charts[id]; const r=HDStore.get(id); const c=await generateChart(r.input); charts[id]=c; return c; }

// 成员配色（Penta 多人通道 / 合盘）：墨 / 朱 / 青 / 金 / 紫 + 各自的浅色(渐变上端)
const MEMBER_COLORS=['#2B2B26','#C0392B','#2E7D86','#C99A2E','#6A5ACD'];
const MEMBER_LIGHT =['#6E6E64','#E07568','#4FB3BA','#E6C861','#9E92E6'];
const abbr=(s,n=5)=>{ s=String(s||''); const head=(s.split(/\s|[-_·]/)[0]||s); return head.length>n?head.slice(0,n)+'…':head; };

// 通用模态框（点遮罩关闭）
function openModal(html){ const m=document.createElement('div'); m.className='modal';
  m.innerHTML=`<div class="modal-box">${html}</div>`;
  m.addEventListener('mousedown',ev=>{ if(ev.target===m) m.remove(); });
  document.body.appendChild(m); return m; }

// 保存合盘/Penta：默认名可编辑、重名提示覆盖/另存（与排盘保存一致）
function saveLink(kind, defaultName, members, hintNames, msgEl){
  const m=openModal(`
    <h3>${ENM?'Save this '+(kind==='penta'?'Penta':'connection'):'保存此'+(kind==='penta'?' Penta':'合盘')}</h3>
    <p class="mhint">${ENM?'Members: ':'成员：'}${esc(hintNames)}</p>
    <input id="lkName" maxlength="60" value="${esc(defaultName)}" />
    <div class="mbtns"><button class="btn ghost" id="lkCancel">${ENM?'Cancel':'取消'}</button><button class="btn" id="lkOk">${ENM?'Save':'保存'}</button></div>`);
  const input=m.querySelector('#lkName'); setTimeout(()=>{input.focus();input.select();},30);
  const finish=(name,overwriteId)=>{ if(overwriteId)HDStore.removeLink(overwriteId);
    const ok=HDStore.addLink({name,kind,members}); m.remove();
    if(msgEl) msgEl.textContent= ok ? (ENM?'✓ Saved as ':'✓ 已保存为 ')+name : (ENM?'✕ Save failed: storage unavailable or full':'✕ 保存失败：浏览器存储不可用或已满');
    if(ok) renderLinks(); };
  const submit=()=>{ const name=input.value.trim(); if(!name)return;
    const dup=HDStore.linksAll().find(r=>r.name===name);
    if(!dup){ finish(name); return; }
    let alt=name,k=2; const names=new Set(HDStore.linksAll().map(r=>r.name)); while(names.has(alt)) alt=name+' ('+(k++)+')';
    m.querySelector('.modal-box').innerHTML=`<h3>${ENM?'Name exists':'已有同名'}</h3>
      <p class="mhint">${ENM?`“${esc(name)}” already saved. Overwrite, or keep both?`:`已存在「${esc(name)}」。覆盖，还是两者都保留？`}</p>
      <div class="mbtns"><button class="btn ghost" id="lkBoth">${ENM?'Keep both → '+esc(alt):'另存「'+esc(alt)+'」'}</button><button class="btn" id="lkOver">${ENM?'Overwrite':'覆盖'}</button></div>`;
    m.querySelector('#lkOver').onclick=()=>finish(name,dup.id);
    m.querySelector('#lkBoth').onclick=()=>finish(alt); };
  m.querySelector('#lkCancel').onclick=()=>m.remove();
  m.querySelector('#lkOk').onclick=submit;
  input.addEventListener('keydown',e=>{ if(e.key==='Enter')submit(); });
}

// 已保存的合盘/Penta：列出、点开重排、删除
function renderLinks(){
  const all=HDStore.linksAll();
  const draw=(el,kind,onOpen)=>{ if(!el)return; const list=all.filter(r=>r.kind===kind);
    el.innerHTML = list.length ? `<div class="cat"><h4>${ENM?'Saved':'已保存'}<span class="hint">${list.length}</span></h4><div class="chips">`+
      list.map(r=>`<span class="chip" data-id="${r.id}" title="${esc(r.members.map(mm=>mm.name).join(' · '))}" style="cursor:pointer"><b>${esc(r.name)}</b> <a data-del="${r.id}" style="color:#B3433A;cursor:pointer;margin-left:4px">✕</a></span>`).join('')+`</div></div>`
      : '';
    el.querySelectorAll('.chip[data-id]').forEach(c=>c.addEventListener('click',ev=>{ if(ev.target.closest('[data-del]'))return; onOpen(all.find(r=>r.id===c.getAttribute('data-id'))); }));
    el.querySelectorAll('[data-del]').forEach(d=>d.addEventListener('click',ev=>{ ev.stopPropagation(); HDStore.removeLink(d.getAttribute('data-del')); renderLinks(); }));
  };
  draw($('connLinks'),'conn',openConnLink); draw($('pentaLinks'),'penta',openPentaLink);
}
function haveRec(id){ return !!HDStore.get(id); }
function openConnLink(rec){ const ok=rec.members.filter(mm=>haveRec(mm.id));
  if(ok.length<2){ $('connSt').textContent=ENM?'Some members were deleted from Records':'部分成员已从记录删除'; return; }
  $('selA').value=ok[0].id; $('selB').value=ok[1].id; $('goConn').click(); }
function openPentaLink(rec){ const ok=rec.members.filter(mm=>haveRec(mm.id));
  document.querySelectorAll('#plist input').forEach(i=>{ i.checked=ok.some(mm=>mm.id===i.value); });
  updatePentaCount();  // 同步计数并启用「生成 Penta」按钮
  if(ok.length<3){ $('pentaSt').textContent=ENM?'Some members were deleted from Records':'部分成员已从记录删除'; return; }
  $('goPenta').click(); }

// ── 合盘 ── CATS: [key, zh标题, zh说明, en标题, en说明]
const CATS=[['companionship','友谊 · 双方完整','彼此都有整条通道：舒适、共鸣，也容易彼此放大','Companionship · both complete','Both carry the whole channel — comfort and resonance, easily amplified'],
  ['dominance','主导 · 一方完整','一方完整、另一方全开放：单向示范与学习，注意尊重差异','Dominance · one complete','One complete, the other fully open — one-way modeling; respect the difference'],
  ['compromise','妥协 · 一方挂单门','一方完整、另一方只有一门：单门方容易感到被带跑，需要觉察','Compromise · one hanging gate','One complete, the other holds a single gate — that side can feel pulled along'],
  ['electromagnetic','电磁 · 你一门我一门','两人各出一门合成通道：吸引与摩擦并存，是关系的火花','Electromagnetic · one gate each','Each brings one gate to complete the channel — attraction and friction, the spark']];
$('goConn').onclick=async()=>{
  const a=$('selA').value,b=$('selB').value;
  if(!a||!b||a===b){ $('connSt').textContent=ENM?'Pick two different people':'请选择两个不同的人'; return; }
  $('connSt').textContent='⏳';
  try{
    const rA=HDStore.get(a), rB=HDStore.get(b);
    const cA=await chartOf(a), cB=await chartOf(b);
    const cx=connection(cA,cB);
    $('connSt').textContent='';
    const fake={ personality:[...cx.gatesA].map(g=>({gate:g})), design:[...cx.gatesB].map(g=>({gate:g})), definedCenters:cx.definedCenters, phs:null };
    const catHtml=CATS.map(([k,zt,zd,et,ed])=>{
      const list=cx.channels.filter(c=>c.cat===k||c.cat===k+'A'||c.cat===k+'B');
      if(!list.length)return '';
      const chip=c=>{ let who='';
        if(c.cat==='dominanceA')who=` ←${esc(rA.name)}`; if(c.cat==='dominanceB')who=` ←${esc(rB.name)}`;
        if(c.cat==='compromiseA')who=ENM?` · ${esc(rA.name)} compromises`:` ·${esc(rA.name)}妥协`;
        if(c.cat==='compromiseB')who=ENM?` · ${esc(rB.name)} compromises`:` ·${esc(rB.name)}妥协`;
        return `<span class="chip"><b>${c.key}</b> ${esc(ENM?(c.en||c.zh):c.zh)}${who}</span>`; };
      return `<div class="cat"><h4>${ENM?et:zt}<span class="hint">${ENM?ed:zd}</span></h4><div class="chips">${list.map(chip).join('')}</div></div>`;
    }).join('');
    $('out').innerHTML=`<div class="duo">
      <div class="graph"><svg class="bodygraph" viewBox="0 0 460 665"></svg>
        <div class="legend"><span><span class="dot" style="background:var(--inkline)"></span>${esc(rA.name)}</span>
        <span><span class="dot" style="background:var(--cinnabar)"></span>${esc(rB.name)}</span>
        <span><span class="dot" style="background:repeating-linear-gradient(90deg,var(--inkline) 0 3px,var(--cinnabar) 3px 6px)"></span>${ENM?'Both':'双方皆有'}</span></div></div>
      <div class="side">
        <div class="summary" style="grid-template-columns:1fr 1fr">
          <div class="card"><div class="k">${ENM?'Defined together':'合体定义中心'}</div><div class="v">${cx.definedCenters.length} / 9</div></div>
          <div class="card"><div class="k">${ENM?'Splits together':'合体分裂数'}</div><div class="v">${cx.splits||0}</div></div>
        </div>
        ${catHtml || (ENM?'<p class="muted">No channels form between these two.</p>':'<p class="muted">两人之间没有形成任何通道连接。</p>')}
        <p class="muted" style="margin-top:10px;font-size:12px">${ENM?'ⓘ Connection reading is a first draft; categories: Companionship / Dominance / Compromise / Electromagnetic.':'ⓘ 合盘解读文案为初稿；分类规则：友谊/主导/妥协/电磁。'}</p>
      </div></div>`;
    HDRender.bodygraph(document.querySelector('#out svg.bodygraph'), fake);
    $('connSave').hidden=false; $('connSaveMsg').textContent='';
    $('connSave').onclick=()=>saveLink('conn', `${rA.name} + ${rB.name}`, [{id:a,name:rA.name},{id:b,name:rB.name}], `${rA.name} · ${rB.name}`, $('connSaveMsg'));
  }catch(e){ $('connSt').textContent=(ENM?'Failed: ':'生成失败：')+(e.message||e); console.error(e); }
};

// ── Penta ──
// 三列大幅拉宽布局（列距 100px），每条通道可并排铺 5 条粗渐变带，直观浑厚
const PXY={31:[120,58],8:[220,58],33:[320,58], 7:[120,156],1:[220,156],13:[320,156], 15:[120,224],2:[220,224],46:[320,224], 5:[120,322],14:[220,322],29:[320,322]};
const PCH=[[31,7],[8,1],[33,13],[15,5],[2,14],[46,29]];
$('goPenta').onclick=async()=>{
  const ids=[...document.querySelectorAll('#plist input:checked')].map(i=>i.value);
  if(ids.length<3||ids.length>5){ $('pentaSt').textContent=ENM?'Pick 3–5 people':'请选择 3-5 人'; return; }
  $('pentaSt').textContent='⏳';
  try{
  const members=[]; for(const id of ids){ const r=HDStore.get(id); members.push({id, name:r.name, chart:await chartOf(id)}); }
  const px=penta(members);
  $('pentaSt').textContent='';
  // 按 id 取色（同名成员不混色）；画线助手
  const memColor=id=>{ const i=members.findIndex(m=>m.id===id); return MEMBER_COLORS[(i<0?0:i)%MEMBER_COLORS.length]; };
  const L=(P,Q,c,w,cap)=>`<line x1="${P[0]}" y1="${P[1]}" x2="${Q[0]}" y2="${Q[1]}" stroke="${c}" stroke-width="${w}" stroke-linecap="${cap||'round'}"/>`;
  // 纵列 SVG（放大浑厚）：渐变定义 → 三中心渐变底形 → 每条通道浅底轨 + 每位成员一条粗渐变带(最多5条并排) → 闸门(带投影)
  const defs='<defs>'
    +MEMBER_COLORS.map((c,i)=>`<linearGradient id="mg${i}" gradientUnits="userSpaceOnUse" x1="0" y1="28" x2="0" y2="352"><stop offset="0" stop-color="${MEMBER_LIGHT[i]}"/><stop offset="1" stop-color="${c}"/></linearGradient>`).join('')
    +`<linearGradient id="cThroat" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#F4E07E"/><stop offset="1" stop-color="#E6C24A"/></linearGradient>`
    +`<linearGradient id="cG" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#F0CE7E"/><stop offset="1" stop-color="#E3B45A"/></linearGradient>`
    +`<linearGradient id="cSac" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#D2533F"/><stop offset="1" stop-color="#B0392B"/></linearGradient>`
    +`<filter id="psh" x="-40%" y="-40%" width="180%" height="180%"><feDropShadow dx="0" dy="1.4" stdDeviation="1.5" flood-color="#3A2A12" flood-opacity="0.16"/></filter>`
    +'</defs>';
  const tD=px.channels.some(c=>c.complete&&['7-31','1-8','13-33'].includes(c.key));
  const sD=px.channels.some(c=>c.complete&&['5-15','2-14','29-46'].includes(c.key));
  // 画 Penta SVG；focus=成员id 时只显该成员的彩带与所承载闸门（图示↔色板联动）
  const pentaSVG=(focus)=>{
    let svg=`<svg viewBox="0 0 440 400" style="width:100%;max-width:520px;height:auto;display:block">`+defs;
    svg+=`<rect x="92" y="28" width="256" height="58" rx="12" fill="${tD?'url(#cThroat)':'#fff'}" stroke="var(--border)"/>`;
    svg+=`<rect x="92" y="126" width="256" height="128" rx="14" fill="${(tD||sD)?'url(#cG)':'#fff'}" stroke="var(--border)"/>`;
    svg+=`<rect x="92" y="294" width="256" height="58" rx="12" fill="${sD?'url(#cSac)':'#fff'}" stroke="var(--border)"/>`;
    for(const [a,b] of PCH){ const A=PXY[a],B=PXY[b];
      svg+=L(A,B,'#E7DCC6',4);  // 浅色底轨
      let parts=members.map((m,i)=>({i,id:m.id,a:px.carriers[a].includes(m.id),b:px.carriers[b].includes(m.id)})).filter(p=>p.a||p.b);
      if(focus!=null) parts=parts.filter(p=>p.id===focus);
      const k=parts.length, dx=B[0]-A[0],dy=B[1]-A[1],len=Math.hypot(dx,dy)||1, ux=-dy/len, uy=dx/len, bw=11, gap=13;
      parts.forEach((p,j)=>{ const off=(j-(k-1)/2)*gap;
        const oa=[A[0]+ux*off,A[1]+uy*off], ob=[B[0]+ux*off,B[1]+uy*off], mid=[(oa[0]+ob[0])/2,(oa[1]+ob[1])/2];
        const seg=(p.a&&p.b)?[oa,ob]:p.a?[oa,mid]:[ob,mid];
        svg+=L(seg[0],seg[1],`url(#mg${p.i%MEMBER_COLORS.length})`,bw); });
    }
    for(const g of PENTA_GATES){ const [x,y]=PXY[g]; const on=focus!=null?px.carriers[g].includes(focus):px.carriers[g].length>0;
      svg+=`<circle cx="${x}" cy="${y}" r="13" fill="${on?'var(--inkline,#2B2B26)':'#fff'}" stroke="#fff" stroke-width="2" filter="url(#psh)"/>`;
      svg+=`<text x="${x}" y="${y+0.5}" text-anchor="middle" dominant-baseline="middle" font-size="12" font-weight="700" fill="${on?'#fff':'#B3433A'}">${g}</text>`; }
    svg+='</svg>'; return svg;
  };
  const palette=members.map((m,i)=>`<span class="lg" data-mid="${esc(m.id)}"><span class="sw" style="background:${MEMBER_COLORS[i%MEMBER_COLORS.length]}"></span>${esc(m.name)}</span>`).join('');
  const rows=PENTA_CHANNELS.flatMap(ch=>ch.gates.map(g=>({g, ch, who:px.carriers[g]})));
  const sep=ENM?', ':'、', gapWord=ENM?'Gap':'缺口';
  const fns=PENTA_CHANNELS.map(ch=>`<div class="fn"><div class="t">${ch.key} · ${esc(ENM?ch.en:ch.zh)}</div>`
    +`<div class="g">${ch.gates.map(g=>`${g} ${esc(ENM?PENTA_GATE_INFO[g].en:PENTA_GATE_INFO[g].zh)}`).join(' · ')}</div>`
    +`<div class="d">${esc(ENM?ch.descEn:ch.desc)}</div></div>`).join('');
  const kb=`<div class="pkb"><h4>${ENM?'What a Penta is':'什么是 Penta'}</h4>`
    +`<p class="intro">${esc(ENM?PENTA_INTRO.en:PENTA_INTRO.zh)}</p>`
    +`<h4>${ENM?'The 6 functions':'六大功能'}</h4><div class="fns">${fns}</div></div>`;
  $('out').innerHTML=`<div class="duo">
      <div class="graph">
        <div id="pgraph">${pentaSVG(null)}</div>
        <div class="pcolor">${palette}</div>
        <p class="muted" style="font-size:12px;margin-top:6px">${ENM?'Tap a name to isolate that member · colored line = a member in the channel · ink dot = gate held · red = gap':'点姓名只看该成员 · 每条彩线＝一位成员 · 墨点＝有人承载 · 红字＝缺口'}</p>
      </div>
      <div class="side">
        <div class="summary" style="grid-template-columns:1fr 1fr">
          <div class="card"><div class="k">${ENM?'Members':'成员'}</div><div class="v">${px.size}${ENM?'':' 人'}</div></div>
          <div class="card"><div class="k">${gapWord}</div><div class="v">${px.gaps.length?px.gaps.join(', '):(ENM?'None ✓':'无 ✓')}</div></div>
        </div>
        <table class="pg"><tr><th>${ENM?'Gate':'闸门'}</th><th>${ENM?'Role':'角色'}</th><th>${ENM?'Carried by':'承载成员'}</th></tr>
        ${rows.map(r=>`<tr><td${r.who.length?'':' class="gap"'}>${r.g} ${esc(ENM?PENTA_GATE_INFO[r.g].en:PENTA_GATE_INFO[r.g].zh)}</td><td>${esc(ENM?(r.ch.rolesEn?r.ch.rolesEn[r.g]:r.ch.roles[r.g]):r.ch.roles[r.g])}<span class="hint" style="color:var(--sub)"> · ${r.ch.key} ${esc(ENM?(r.ch.en||r.ch.zh):r.ch.zh)}</span></td><td>${r.who.length?r.who.map(id=>{const nm=(members.find(m=>m.id===id)||{}).name||id; return `<span style="color:${memColor(id)};font-weight:600">${esc(nm)}</span>`;}).join(sep):`<span style="color:#B3433A">${gapWord}</span>`}</td></tr>`).join('')}
        </table>
      </div>
    </div>
    ${kb}
    <p class="muted" style="margin-top:10px;font-size:12px">${ENM?'ⓘ A Penta is a 3–5 person field; 2 is a partnership, 6+ becomes a WA. Role text is a GuanJi first draft.':'ⓘ Penta 为 3-5 人场域；2 人是伴侣连结、6 人及以上成为 WA。角色文案为观己白话初稿。'}</p>`;
  // 图示↔色板联动：点成员只看该成员，再点恢复全部
  let pfocus=null;
  $('out').querySelectorAll('.pcolor .lg[data-mid]').forEach(el=>el.onclick=()=>{
    const id=el.getAttribute('data-mid'); pfocus=(pfocus===id)?null:id;
    $('pgraph').innerHTML=pentaSVG(pfocus);
    $('out').querySelectorAll('.pcolor .lg').forEach(x=>x.classList.toggle('on', x.getAttribute('data-mid')===pfocus));
  });
  $('pentaSave').hidden=false; $('pentaSaveMsg').textContent='';
  $('pentaSave').onclick=()=>saveLink('penta', members.map(m=>abbr(m.name)).join('·'), ids.map((id,i)=>({id,name:members[i].name})), members.map(m=>m.name).join(' · '), $('pentaSaveMsg'));
  }catch(e){ $('pentaSt').textContent=(ENM?'Failed: ':'生成失败：')+(e.message||e); console.error(e); }
};
// Penta 说明段按语言（静态 HTML 已 data-noi18n 豁免，避免 EN 模式漏中文）
$('pentaHint').textContent = ENM
  ? 'Pick 3–5 people (from Records). Penta looks only at the Throat–G–Sacral column: 6 channels / 12 gates — the roles and gaps of a group field.'
  : tw('勾选 3-5 人（来自「记录」）。Penta 只看 喉咙-G-荐骨 纵列的 6 条通道 / 12 个闸门：小组场域的角色与缺口。');

// 从「记录」页点开已存合盘/Penta：?openLink=id → 切到对应模式并自动重排
(function bootLink(){
  const id=new URLSearchParams(location.search).get('openLink'); if(!id||!window.HDStore)return;
  const rec=HDStore.getLink(id); if(!rec)return;
  const isPenta=rec.kind==='penta';
  [...$('mode').children].forEach(x=>x.classList.toggle('on',x.dataset.m===(isPenta?'penta':'conn')));
  $('connForm').hidden=isPenta; $('pentaForm').hidden=!isPenta;
  if(isPenta) openPentaLink(rec); else openConnLink(rec);
})();
</script>
</body>
</html>

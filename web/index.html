<script type="module">
import { generateChart } from '/src/chart.js';
import { TYPES, AUTHORITIES, PROFILES, CENTERS_KB, GATES_KB, CHANNELS_KB } from '/src/hd-knowledge.js';
import { EN_KB } from '/src/hd-book-data.js';
const $ = id => document.getElementById(id);
const ENM = window.HDI18N && window.HDI18N.lang==='en';
const CENTER_EN={Head:'Head',Ajna:'Ajna',Throat:'Throat',G:'G (Identity)',Heart:'Heart (Ego)',Sacral:'Sacral',SolarPlexus:'Solar Plexus',Spleen:'Spleen',Root:'Root'};

// ── 出生地：统一搜索（中文 / 英文 / 拼音 / 拼音首字母，一个框搞定）──
// 数据：places.js 精选城(双语) + cn-cities(中国省市区+拼音+首字母) + world-cities(3.3万海外城) + 中文名 sidecar
let selTz='Asia/Shanghai', placeLabel='', sexVal='F', chartSource='';   // chartSource: ''=正常排盘 / 'solve'=反推页带入
const locq=$('locq'), drop=$('locdrop');
const PL=window.HD_PLACES||[];
let WORLD=null, WORLDZH=null, CNC=null, geoP=null;   // 懒加载：首次输入时拉三份数据
function loadGeo(){
  if(geoP) return geoP;
  geoP=Promise.all([
    fetch('world-cities-v1.json').then(r=>r.json()),
    fetch('world-cities-zh-v1.json').then(r=>r.ok?r.json():null).catch(()=>null),
    fetch('cn-cities-v1.json').then(r=>r.json()),
  ]).then(([w,wz,c])=>{ WORLD=w; WORLDZH=wz||[]; CNC=c; }).catch(()=>{ geoP=null; });
  return geoP;
}
const norm=s=>s.toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g,'');   // 去变音：são→sao
const escq=s=>String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;');
// 高亮 q（去变音不区分大小写）在 name 中的命中片段
const hl=(name,q)=>{ if(!q) return escq(name); const i=norm(name).indexOf(q); if(i<0) return escq(name);
  return escq(name.slice(0,i))+'<b>'+escq(name.slice(i,i+q.length))+'</b>'+escq(name.slice(i+q.length)); };
const hlcjk=(name,raw)=>{ const i=cz(name).indexOf(cz(raw)); if(i<0) return escq(name);  // cz 为 1:1 字符映射，下标与原串对齐
  return escq(name.slice(0,i))+'<b>'+escq(name.slice(i,i+raw.length))+'</b>'+escq(name.slice(i+raw.length)); };
const pLab=p=>ENM?`${p[0]}, ${p[2]}`:`${p[3]} · ${p[1]}`;
const VIP=new Set(['北京市','上海市','天津市','重庆市','广东省 · 广州市','广东省 · 深圳市','四川省 · 成都市','浙江省 · 杭州市','湖北省 · 武汉市','陕西省 · 西安市','江苏省 · 南京市','湖南省 · 长沙市','江苏省 · 苏州市','福建省 · 厦门市']);
const IT_CN={act:'cn',label:ENM?'🇨🇳 Browse China (wheel)':'🇨🇳 浏览：中国省市区（滚轮）'};
const IT_CUSTOM={act:'custom',label:ENM?'⌨ Custom IANA timezone':'⌨ 自定义 IANA 时区'};
let items=[], active=-1;
function renderDrop(){
  drop.innerHTML=items.map((it,i)=>`<div class="it${i===active?' on':''}" data-i="${i}"><span class="lb">${it.label}</span>${it.tz?`<span class="tzs">${escq(it.tz)}</span>`:''}</div>`).join('');
  drop.hidden=!items.length;
}
function suggest(){
  const raw=locq.value.trim();
  active=-1;
  if(!raw){ items=[IT_CN,...PL.slice(0,10).map(p=>({label:pLab(p),tz:p[4],place:pLab(p)})),IT_CUSTOM]; renderDrop(); return; }
  build(raw);                                  // 已加载数据先即时出
  loadGeo().then(()=>{ if(locq.value.trim()===raw) build(raw); });   // 数据到位后重建
}
// 简繁归一：把查询与候选都折叠到繁体字形再比，化解简体用户打「纽约」匹配不到数据里繁体「紐約」
const cz=s=>(window.HDI18N&&HDI18N.s2t)?HDI18N.s2t(s):s;
function build(raw){
  const cjk=/[一-鿿]/.test(raw), q=norm(raw).replace(/\s+/g,''), rz=cz(raw);
  const pre=[], inc=[];                         // 命中桶：前缀优先 / 包含其次
  const claimed=new Set();                      // 跨源去重：城市签名（英文/拼音小写）
  const sig=s=>norm(s).replace(/[^a-z]/g,'');
  // 1) 精选城（双语，最高优先；其英文签名登记，避免后续重复出现）
  for(const p of PL){
    const en=norm(p[0]), enc=norm(p[2]), o={tz:p[4],place:pLab(p),w:1e9};   // 精选城权重最高
    if(cjk){ const z=cz(p[1]);
      if(z.includes(rz)||cz(p[3]).includes(rz)){ claimed.add(sig(p[0]));
        o.label=ENM?`${escq(p[0])}, ${escq(p[2])}`:`${escq(p[3])} · ${hlcjk(p[1],raw)}`;
        (z.startsWith(rz)?pre:inc).push(o); } }
    else { o.label=ENM?`${hl(p[0],q)}, ${escq(p[2])}`:`${escq(p[3])} · ${escq(p[1])}`;
      if(en.startsWith(q)||enc.startsWith(q)){ claimed.add(sig(p[0])); pre.push(o); }
      else if(q.length>=2&&en.includes(q)){ claimed.add(sig(p[0])); inc.push(o); } }
  }
  // 2) 中国省市区（中文名 / 全拼 / 首字母；权重=VIP+行政级别）
  if(CNC) for(const r of CNC){
    const label=r[0], full=r[1], ini=r[2], lvl=r[3];
    if(lvl<=2&&claimed.has(full)) continue;     // 省/市级已被精选城覆盖（上海/北京…），不重复
    const w=(VIP.has(label)?1e7:0)+(lvl===2?3e5:lvl===1?2e5:1e5);
    if(cjk){ if(cz(label).includes(rz)){ const leaf=label.split(' · ').pop();
        (cz(leaf).startsWith(rz)?pre:inc).push({label:'🇨🇳 '+hlcjk(label,raw),tz:'Asia/Shanghai',place:label,w}); } }
    else if(full.startsWith(q)){ if(lvl<=2)claimed.add(full); pre.push({label:`🇨🇳 ${escq(label)} <span class="pyh">${hl(full,q)}</span>`,tz:'Asia/Shanghai',place:label,w:w+5e4}); }
    else if(ini===q){ inc.push({label:`🇨🇳 ${escq(label)} <span class="pyh">${escq(ini)}</span>`,tz:'Asia/Shanghai',place:label,w}); }
    else if(q.length>=3&&full.includes(q)){ inc.push({label:`🇨🇳 ${escq(label)} <span class="pyh">${hl(full,q)}</span>`,tz:'Asia/Shanghai',place:label,w}); }
  }
  // 3) 海外 3.3 万城（英文名前缀 + 中文名 sidecar）；data 已按人口降序，命中即近最优
  if(WORLD) for(let i=0;i<WORLD.length;i++){
    const c=WORLD[i], en=c[0], zh=(WORLDZH&&WORLDZH[i])||'';
    if(claimed.has(sig(en))) continue;           // 已被精选/中国库覆盖，去重
    const tail=(c[1]?', '+escq(c[1]):'')+', '+escq(c[2]);
    if(cjk){ if(zh&&cz(zh).includes(rz)){ (cz(zh).startsWith(rz)?pre:inc).push({label:`${hlcjk(zh,raw)} <span class="pyh">${escq(en)}</span>${tail}`,tz:c[3],place:`${en}, ${c[2]}`,w:c[4]}); } }
    else { const n=norm(en);
      if(n.startsWith(q)) pre.push({label:`${hl(en,q)}${tail}`,tz:c[3],place:`${en}, ${c[2]}`,w:c[4]});
      else if(q.length>=3&&n.includes(q)) inc.push({label:`${hl(en,q)}${tail}`,tz:c[3],place:`${en}, ${c[2]}`,w:c[4]}); }
    if(pre.length>60) break;                      // 常见前缀够用即止（已按人口序，前列即最大城）
  }
  const byW=(a,b)=>b.w-a.w;
  pre.sort(byW); inc.sort(byW);
  const out=[...pre,...inc].slice(0,12);
  if(raw.includes('/')&&!cjk) out.unshift({label:(ENM?'Use timezone ':'使用时区 ')+escq(raw),tz:raw,isTz:1});
  if(!out.length) out.push({label:ENM?'No match — try English, pinyin or 中文':'没找到——试试英文 / 拼音 / 中文',noop:1});
  out.push(IT_CN,IT_CUSTOM);
  items=out; renderDrop();
}
function applyItem(it){
  if(!it||it.noop) return;
  drop.hidden=true;
  if(it.act==='cn'){ openRegion(); return; }
  if(it.act==='custom'){ selTz='__custom__'; $('tzCustom').hidden=false; locq.value=''; locq.focus(); $('placeTag').textContent=''; return; }
  selTz=it.tz; $('tzCustom').hidden=true;
  placeLabel=it.isTz?'':(it.place||'');
  locq.value=it.isTz?it.tz:(it.place||'');       // place=纯文本（label 含高亮 <b>，不能直接用）
  $('placeTag').textContent='🕐 '+it.tz;
  run();
}
function moveActive(d){
  const sel=items.map((it,i)=>it.noop?-1:i).filter(i=>i>=0);
  if(!sel.length) return;
  const cur=sel.indexOf(active);
  active=sel[(cur+d+sel.length)%sel.length];
  renderDrop();
  const el=drop.querySelector('.it.on'); if(el) el.scrollIntoView({block:'nearest'});
}
locq.addEventListener('focus',()=>{locq.select();suggest();});
locq.addEventListener('input',suggest);
locq.addEventListener('keydown',e=>{
  if(drop.hidden||!items.length) return;
  if(e.key==='ArrowDown'){ e.preventDefault(); moveActive(1); }
  else if(e.key==='ArrowUp'){ e.preventDefault(); moveActive(-1); }
  else if(e.key==='Enter'){ e.preventDefault(); applyItem(items[active>=0?active:items.findIndex(it=>!it.noop)]); }
  else if(e.key==='Escape'){ drop.hidden=true; }
});
drop.addEventListener('mousedown',e=>{ const c=e.target.closest('.it'); if(!c)return; e.preventDefault(); applyItem(items[+c.dataset.i]); });
document.addEventListener('click',e=>{ if(!e.target.closest('.locbox')) drop.hidden=true; });

// ── 图内知识弹窗：闸门 / 中心 / 通道 / PHS 在同一个框里互跳（带返回），不离开盘面 ──
let gjMask=null, navStack=[], curChart=null, GL=null;
// 爻线数据按需动态加载（76KB gz，不拖累首屏；首次点闸门时拉）
const ensureGL=async()=>{ if(GL===null){ try{ GL=(await import('/src/hd-lines.js')).GATE_LINES; }catch(e){ GL={}; } } };
// 弹窗内六爻 ▲▼ 渲染
function glLines(g){ const gl=GL&&GL[g]; if(!gl) return '';
  const rows=[1,2,3,4,5,6].map(i=>{ const L=gl[i]; if(!L)return '';
    const pol=(L.pol||[]).map(p=>{ const ex=p.t==='exalted'; return `<div class="pol ${ex?'ex':'de'}"><span class="pmark">${ex?'▲':'▼'}</span> <b>${escq(p.p)}</b> · ${escq(ENM?p.e:p.z)}</div>`; }).join('');
    return `<div class="gline"><div class="glh"><span class="ln">${i}</span> <b>${escq(ENM?L.te:L.tz)}</b></div>${L.mz||L.me?`<div class="glm">${escq(ENM?L.me:L.mz)}</div>`:''}${pol}</div>`; }).join('');
  return `<div class="glines"><div class="glhd">${ENM?'Six Lines · ▲ exalted / ▼ detriment':'六爻 · ▲扬升 / ▼落陷'}</div>${rows}</div>`; }
const CENTER_EN2={Head:'Head',Ajna:'Ajna',Throat:'Throat',G:'G (Identity)',Heart:'Heart (Ego)',Sacral:'Sacral',SolarPlexus:'Solar Plexus',Spleen:'Spleen',Root:'Root'};
function escClose(e){ if(e.key==='Escape') closeSheet(); }
function closeSheet(){ if(gjMask){ gjMask.remove(); gjMask=null; navStack=[]; document.removeEventListener('keydown',escClose); } }
// 自定义内容浮层（重名提示等用）：复用 gj 外壳，返回 .gj-sheet 供调用方 querySelector
function openSheet(html){ ensureSheet(); navStack=[]; const sheet=gjMask.querySelector('.gj-sheet'); gjMask.querySelector('.gj-back').hidden=true; gjMask.querySelector('.gj-body').innerHTML=html; sheet.scrollTop=0; sheet.style.transform=''; return sheet; }
function ensureSheet(){
  if(gjMask) return gjMask;
  const mask=document.createElement('div'); mask.className='gj-mask';
  mask.innerHTML=`<div class="gj-sheet"><div class="gj-top"><button class="gj-back" type="button" hidden>‹ ${ENM?'Back':'返回'}</button><button class="gj-x" type="button" aria-label="${ENM?'Close':'关闭'}">✕</button></div><div class="gj-body"></div></div>`;
  document.body.appendChild(mask); gjMask=mask;
  const sheet=mask.querySelector('.gj-sheet');
  mask.addEventListener('mousedown',e=>{ if(e.target===mask) closeSheet(); });
  sheet.querySelector('.gj-x').onclick=closeSheet;
  sheet.querySelector('.gj-back').onclick=()=>{ navStack.pop(); render(); };
  sheet.querySelector('.gj-body').addEventListener('click',async e=>{ const a=e.target.closest('[data-nav]'); if(!a)return; e.preventDefault(); navStack.push(a.getAttribute('data-nav')); await ensureGL(); render(); });
  let sy=0,dy=0,drag=false;
  sheet.addEventListener('touchstart',e=>{ if(sheet.scrollTop>0)return; sy=e.touches[0].clientY; drag=true; dy=0; },{passive:true});
  sheet.addEventListener('touchmove',e=>{ if(!drag)return; dy=e.touches[0].clientY-sy; if(dy>0) sheet.style.transform=`translateY(${dy}px)`; },{passive:true});
  sheet.addEventListener('touchend',()=>{ if(dy>70) closeSheet(); else sheet.style.transform=''; drag=false; });
  document.addEventListener('keydown',escClose);
  return mask;
}
async function openNav(view){ navStack=[view]; ensureSheet(); render(); if(view.startsWith('gate:')){ await ensureGL(); render(); } }
function render(){
  ensureSheet();
  const sheet=gjMask.querySelector('.gj-sheet'), body=sheet.querySelector('.gj-body');
  gjMask.querySelector('.gj-back').hidden = navStack.length<=1;
  body.innerHTML=renderView(navStack[navStack.length-1]);
  sheet.scrollTop=0; sheet.style.transform='';
}
function renderView(v){ const i=v.indexOf(':'),t=v.slice(0,i),k=v.slice(i+1);
  if(t==='gate')return viewGate(k); if(t==='center')return viewCenter(k); if(t==='channel')return viewChannel(k); if(t==='phs')return viewPhs(k); return ''; }

// 输入校验：年份范围 + 时区合法（自定义 IANA 防手滑打错导致排盘报错）
function validInput(input){
  const {year,month,day,hour,minute,tz}=input;
  if(!(year>=1700&&year<=2200)) return ENM?'Year must be 1700–2200':'年份需在 1700–2200 之间';
  if(!(month>=1&&month<=12)) return ENM?'Month must be 1–12':'月份需在 1–12 之间';
  if(!(day>=1&&day<=31)) return ENM?'Day must be 1–31':'日期需在 1–31 之间';
  if(!(hour>=0&&hour<=23)) return ENM?'Hour must be 0–23':'小时需在 0–23 之间';
  if(!(minute>=0&&minute<=59)) return ENM?'Minute must be 0–59':'分钟需在 0–59 之间';
  try{ Intl.DateTimeFormat('en-US',{timeZone:tz}); }catch(e){ return (ENM?'Invalid timezone: ':'时区无效：')+tz; }
  return '';
}
let busy=false, lastRun=null;
async function run(tag,auto){
  if(busy)return; busy=true;
  const st=$('status'); st.className='status'; st.textContent='⏳ Calculating…';
  try{
    const tz=selTz==='__custom__'?($('tzText').value.trim()||'Asia/Shanghai'):selTz;
    const input={year:+$('y').value,month:+$('mo').value,day:+$('d').value,hour:+$('h').value,minute:+$('mi').value,tz,ephemerisMode:$('mode').value,nodeType:$('node').value};
    const err=validInput(input);
    if(err){ st.className='status err'; st.textContent='✕ '+err; busy=false; return; }
    const c=await generateChart(input);
    const label=`${input.year}-${String(input.month).padStart(2,'0')}-${String(input.day).padStart(2,'0')} ${input.hour}:${String(input.minute).padStart(2,'0')} ${tz}`;
    show(c, `${tag?tag+' · ':''}✓ ${label} · ${c.config.mode}/${c.config.node} · design −${c.designDaysBefore.toFixed(1)}d`, auto);
    lastRun={input,chart:c}; $('saveBtn').hidden=!!auto; if(!auto)$('savemsg').textContent='';
    $('nowbanner').hidden=!auto;
  }catch(e){ st.className='status err'; st.textContent='Error: '+(e.message||e); console.error(e); }
  busy=false;
}

const autoName=()=>{ const d=new Date(), p=n=>String(n).padStart(2,'0');

const uniqueName=nm=>{ const names=new Set(HDStore.all().map(r=>r.name)); if(!names.has(nm))return nm; let n=2; while(names.has(`${nm} (${n})`)) n++; return `${nm} (${n})`; };
function doSave(name, overwriteId){
  if(overwriteId) HDStore.remove(overwriteId);
  const id=HDStore.add({ name, gender:sexVal||'F', ...(chartSource?{source:chartSource}:{}), input:{...lastRun.input, ...(placeLabel?{place:placeLabel}:{})}, sum:HDStore.summarize(lastRun.chart) });
  if(id){ $('savemsg').textContent=(ENM?'✓ Saved as ':'✓ 已保存为 ')+name; if(!$('sname').value.trim()) $('sname').value=name; }
  else $('savemsg').textContent=ENM?'✕ Save failed: storage unavailable or full':'✕ 保存失败：浏览器存储不可用或已满';
}

    $('sname').value=rec.name==='—'?'':rec.name; run(rec.name); return; }
  if(sp.get('y')&&sp.get('mo')){ // 外部带参直开：?y&mo&d&h&mi&tz&name&sex&src&place（反推页 src=solve / 名人库 src=celeb）
    const src=sp.get('src'); if(src==='solve'||src==='celeb') chartSource=src;
    const gv=(k,d)=>sp.get(k)!=null?+sp.get(k):d;   // 存在性判断：午夜 hour=0 不能被 ||12 吞掉
    fillForm({year:+sp.get('y'),month:+sp.get('mo'),day:gv('d',1),hour:gv('h',12),minute:gv('mi',0),tz:sp.get('tz')||'Asia/Shanghai'});
    if(sp.get('place')){ placeLabel=sp.get('place'); locq.value=placeLabel; $('placeTag').textContent='🕐 '+(sp.get('tz')||'Asia/Shanghai'); } // 名人库带出生地标签，保存时一并保留
    $('sname').value=sp.get('name')||'';
    const sx=sp.get('sex'); if(sx==='M'||sx==='F') setSex(sx);   // 白名单：防畸形深链污染性别
    run(sp.get('name')||''); return;
  }
  const now=new Date();
  let tz='Asia/Shanghai';
  try{ tz=Intl.DateTimeFormat().resolvedOptions().timeZone||tz; }catch(e){}
  fillForm({year:now.getFullYear(),month:now.getMonth()+1,day:now.getDate(),hour:now.getHours(),minute:now.getMinutes(),tz});
  run('Now', true).then(()=>{   // 自动流日盘：亮横幅、藏保存栏，防止小白把它当本命盘
    const sg=$('spgraph');      // 开屏页缩略「流日人类图」：用此刻流日盘渲染
    if(sg&&curChart){ try{ HDRender.bodygraph(sg,curChart); sg.removeAttribute('hidden'); }catch(e){} }  // SVG 须 removeAttribute(hidden 非 IDL 属性)
  });
})();
</script>
</body>
</html>

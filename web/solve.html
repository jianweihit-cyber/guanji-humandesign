<!doctype html>
<html lang="zh-CN">
<head>
<script>/*i18n-foucguard*/(function(){try{var n=(navigator.language||"").toLowerCase(),q=new URLSearchParams(location.search).get("lang"),L=(["zh-Hans","zh-Hant","en"].indexOf(q)>=0?q:"")||localStorage.getItem("hd_lang")||(n.indexOf("zh")===0?(/^zh-(tw|hk|mo|hant)/.test(n)?"zh-Hant":"zh-Hans"):"en");if(L!=="zh-Hans"){var d=document.documentElement;d.style.visibility="hidden";setTimeout(function(){d.style.visibility=""},1500);}}catch(e){}})();</script>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>反推出生时间 · 观己</title>
<link rel="icon" type="image/svg+xml" href="logo.svg" />
<link rel="stylesheet" href="hd.css" />
<style>
  table.solv{width:100%;border-collapse:collapse;background:#fff;border:1px solid #EDE4D4;border-radius:12px;overflow:hidden;margin-top:10px}
  .solv th,.solv td{padding:6px 8px;text-align:center;border-bottom:1px solid #F3ECDF;font-size:13px}
  .solv th{background:#FAF5EA;color:#8A7A5E;font-weight:600}
  .solv td.p{font-weight:700;white-space:nowrap;text-align:center}
  .solv input{width:58px;padding:5px 6px;border:1px solid #D8CFC0;border-radius:8px;text-align:center;font-size:13px}
  .solv select{padding:5px 4px;border:1px solid #D8CFC0;border-radius:8px;font-size:13px}
  .solv .pz input,.solv .pz select{border-color:#bdb6a8}
  .solv .dz input,.solv .dz select{border-color:#E0B5AE}
  .res{display:flex;align-items:center;gap:10px;background:#fff;border:1px solid #EDE4D4;border-radius:12px;padding:10px 12px;margin-top:8px}
  .res .t{flex:1;font-size:14px}
  .res .w{font-size:12px;color:var(--sub)}
  .btn-sm{font-size:12px;padding:6px 10px;border-radius:8px;border:1px solid #D8CFC0;background:#fff;cursor:pointer;color:#6B5B43;text-decoration:none;white-space:nowrap}
  .btn-sm:disabled{opacity:.4;cursor:default}
  .field.in input{width:92px;font-size:15px}
  .pager{display:flex;gap:12px;align-items:center;justify-content:center;margin-top:12px}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="brand"><img src="logo.svg" class="brandlogo" alt="" />观<span class="li">己</span> · 人类图 <span class="sub">反推出生时间</span></div>
  </header>
  <div class="tabs">
    <a class="tab" href="home.html">首页</a>
    <a class="tab" href="index.html">排盘</a>
    <a class="tab" href="mandala.html">流日</a>
    <a class="tab" href="history.html">记录</a>
    <a class="tab on" href="solve.html">反推</a>
    <a class="tab" href="connect.html">合盘</a>
    <a class="tab" href="learn.html">学习 · 知识库</a>
    <a class="tab" href="celebs.html">名人</a>
  </div>

  <p class="muted" style="margin:10px 2px 0;font-size:13px">只有人类图、没有出生时间？填入图上各行星的闸门(.爻线)——填得越多越准；至少需要 个性太阳。地球/南交点也可填（与太阳/北交点互为对宫，可作校验）。</p>

  <div class="solv-wrap">
  <table class="solv">
    <thead><tr><th colspan="2" style="color:#B3433A">设计 Design（红）</th><th></th><th colspan="2">个性 Personality（黑）</th></tr>
    <tr><th>闸门</th><th>爻</th><th></th><th>闸门</th><th>爻</th></tr></thead>
    <tbody id="rows"></tbody>
  </table>
  </div>

  <div class="form" style="margin-top:10px">
    <div class="frow" style="margin-bottom:10px">
      <div class="field" style="flex:1;min-width:150px;max-width:280px"><label>盘主名字（可选） <span id="namecount" class="namecount" data-noi18n></span></label><input id="sname" maxlength="50" placeholder="如：张三 / Alex" /></div>
      <div class="field"><label>性别</label><div class="seg" id="sex"><button type="button" data-v="F" class="on">女</button><button type="button" data-v="M">男</button></div></div>
    </div>
    <div class="frow" style="align-items:flex-end">
      <div class="field in"><label>起始年</label><input id="y0" type="number" value="1940" /></div>
      <div class="field in"><label>结束年</label><input id="y1" type="number" value="2010" /></div>
      <div class="field" style="flex:1;min-width:160px"><label>显示时区 (IANA)</label><input id="tz" list="tzlist" placeholder="Asia/Shanghai" />
      <datalist id="tzlist"><option>Asia/Shanghai</option><option>Asia/Hong_Kong</option><option>Asia/Taipei</option><option>Asia/Tokyo</option><option>Asia/Seoul</option><option>Asia/Singapore</option><option>Asia/Bangkok</option><option>Asia/Kolkata</option><option>Asia/Dubai</option><option>Europe/London</option><option>Europe/Paris</option><option>Europe/Berlin</option><option>Europe/Moscow</option><option>America/New_York</option><option>America/Chicago</option><option>America/Denver</option><option>America/Los_Angeles</option><option>America/Sao_Paulo</option><option>Australia/Sydney</option><option>Pacific/Auckland</option></datalist></div>
      <button class="btn" id="go">开始反推</button>
    </div>
    <div class="status" id="status"></div>
  </div>
  <div id="out"></div>
</div>

<script type="importmap">
{ "imports": { "swisseph-wasm": "/node_modules/swisseph-wasm/src/swisseph.js" } }
</script>
<script src="i18n.js"></script>
<script src="wheel.js"></script>
<script type="module">
import { solveBirth, jdToLocal } from '/src/hd-solve.js';
import { PLANETS, GATE_ORDER } from '/src/hd-data.js';
const $=id=>document.getElementById(id);
const ENM = window.HDI18N && window.HDI18N.lang==='en';

// 姓名/性别（可选）：带到出盘与保存，方便区分反推案例
let sexVal='F';
const sexBox=$('sex');
if(ENM){ sexBox.children[0].textContent='Female'; sexBox.children[1].textContent='Male'; }
sexBox.onclick=e=>{ const b=e.target.closest('button'); if(b){ sexVal=b.dataset.v; for(const x of sexBox.children) x.classList.toggle('on',x===b); } };
const sname=$('sname'), namecount=$('namecount');
sname.addEventListener('input',()=>{ const n=sname.value.length; namecount.textContent=n?`${n}/50`:''; namecount.classList.toggle('warn',n>=50); });

// 13 行星输入行（中间行星名随语言切换：EN 模式纯英文）
$('rows').innerHTML = PLANETS.map(p=>`
  <tr data-k="${p.key}">
    <td class="dz"><input class="dg" type="number" min="1" max="64" /></td>
    <td class="dz"><select class="dl"><option value="">—</option>${[1,2,3,4,5,6].map(i=>`<option>${i}</option>`).join('')}</select></td>
    <td class="p" ${ENM?'data-noi18n':''}>${p.glyph} ${ENM?p.en:p.zh}</td>
    <td class="pz"><input class="pg" type="number" min="1" max="64" /></td>
    <td class="pz"><select class="pl"><option value="">—</option>${[1,2,3,4,5,6].map(i=>`<option>${i}</option>`).join('')}</select></td>
  </tr>`).join('');

// 对宫联动：日↔地、北交↔南交（黑/红两层各自独立）——闸门=对宫(轮序+32)、爻线=同爻
const OPP=g=>{const i=GATE_ORDER.indexOf(+g);return i<0?null:GATE_ORDER[(i+32)%64];};
const PAIRS={Sun:'Earth',Earth:'Sun',NorthNode:'SouthNode',SouthNode:'NorthNode'};
document.getElementById('rows').addEventListener('change',e=>{
  const tr=e.target.closest('tr'); if(!tr||!PAIRS[tr.dataset.k]) return;
  const side=e.target.className.startsWith('p')?'p':'d';
  const ptr=document.querySelector(`#rows tr[data-k="${PAIRS[tr.dataset.k]}"]`);
  const g=tr.querySelector('.'+side+'g').value, l=tr.querySelector('.'+side+'l').value;
  if(g){const og=OPP(g); if(og) ptr.querySelector('.'+side+'g').value=og;}
  ptr.querySelector('.'+side+'l').value=l||'';
});

try{ $('tz').value=Intl.DateTimeFormat().resolvedOptions().timeZone||'Asia/Shanghai'; }catch(e){ $('tz').value='Asia/Shanghai'; }

// 年份滚轮选择（点击 From/To 弹出）
for(const id of ['y0','y1']){ const el=$(id); el.readOnly=true; el.style.cursor='pointer';
  el.addEventListener('click',()=>window.HDWheel&&HDWheel.openYear({y:+el.value||1970,
    title:(window.HDI18N&&HDI18N.lang==='en')?(id==='y0'?'From year':'To year'):(id==='y0'?'起始年':'结束年'),
    onDone:y=>{el.value=y;}}));}


function collect(){
  const t={personality:{},design:{}};
  for(const tr of document.querySelectorAll('#rows tr')){
    const k=tr.dataset.k;
    const pg=+tr.querySelector('.pg').value, pl=+tr.querySelector('.pl').value;
    const dg=+tr.querySelector('.dg').value, dl=+tr.querySelector('.dl').value;
    if(pg>=1&&pg<=64) t.personality[k]={gate:pg,line:pl||null};
    if(dg>=1&&dg<=64) t.design[k]={gate:dg,line:dl||null};
  }
  return t;
}

let busy=false;
$('go').onclick=async()=>{
  if(busy)return; busy=true;
  const st=$('status'); st.className='status'; $('out').innerHTML='';
  const targets=collect(), tz=$('tz').value.trim()||'Asia/Shanghai';
  try{
    const t0=performance.now();
    const res=await solveBirth({ targets, yearFrom:+$('y0').value||1940, yearTo:+$('y1').value||2010, maxResults:2000,
      onProgress:(y,rs)=>{ st.textContent=`⏳ ${y} … (${rs.length})`; } });
    const ms=((performance.now()-t0)/1000).toFixed(1);
    st.textContent=res.length?`✓ ${res.length} · ${ms}s`:'';
    const row=r=>{
      const a=jdToLocal(r.jdStart,tz), b=jdToLocal(r.jdEnd,tz);
      const mid=jdToLocal((r.jdStart+r.jdEnd)/2,tz);
      const w=((r.jdEnd-r.jdStart)*1440).toFixed(0);
      const [d,hm]=mid.split(' '), [Y,Mo,D]=d.split('-'), [H,Mi]=hm.split(':');
      const nm=sname.value.trim();   // 用户填了名字就带过去；没填则留空，出盘页保存时自动「案主-时间戳」+反推标识
      const link=`index.html?y=${Y}&mo=${+Mo}&d=${+D}&h=${+H}&mi=${+Mi}&tz=${encodeURIComponent(tz)}${nm?'&name='+encodeURIComponent(nm):''}&sex=${sexVal}&src=solve`;
      return `<div class="res"><div class="t"><b>${a}</b> ~ <b>${b.split(' ')[1]||b}</b> <span class="w">(${tz})</span><div class="w">± window ${w} min · mid ${mid.split(' ')[1]}</div></div><a class="btn-sm" href="${link}">用中点出盘</a></div>`;
    };
    const PP=10; let pg=0;
    const renderPage=()=>{
      const tot=Math.max(1,Math.ceil(res.length/PP));
      $('out').innerHTML = res.length
        ? res.slice(pg*PP,(pg+1)*PP).map(row).join('')
          + (res.length>PP?`<div class="pager"><button class="btn-sm" id="pgP" ${pg?'':'disabled'}>‹ Prev</button><span style="font-size:12px;color:var(--sub)">${pg+1} / ${tot} · ${res.length}</span><button class="btn-sm" id="pgN" ${pg<tot-1?'':'disabled'}>Next ›</button></div>`:'')
        : '<p class="muted" style="margin-top:14px">无匹配：检查输入或放宽年份范围（爻线不确定就先留空）</p>';
      if(res.length>PP){ $('pgP').onclick=()=>{ if(pg>0){pg--;renderPage();} }; $('pgN').onclick=()=>{ if(pg<tot-1){pg++;renderPage();} }; }
    };
    renderPage();
  }catch(e){
    st.className='status err';
    st.textContent = e.message==='need-personality-sun' ? '至少填写：个性太阳的闸门' : ('Error: '+(e.message||e));
  }
  busy=false;
};
</script>
</body>
</html>

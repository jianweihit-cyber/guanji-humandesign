<!doctype html>
<html lang="zh-CN">
<head>
<script>/*i18n-foucguard*/(function(){try{var _t=localStorage.getItem("hd_theme");if(_t)document.documentElement.setAttribute("data-theme",_t);var n=(navigator.language||"").toLowerCase(),q=new URLSearchParams(location.search).get("lang"),L=(["zh-Hans","zh-Hant","en"].indexOf(q)>=0?q:"")||localStorage.getItem("hd_lang")||(n.indexOf("zh")===0?(/^zh-(tw|hk|mo|hant)/.test(n)?"zh-Hant":"zh-Hans"):"en");if(L!=="zh-Hans"&&!/^\/(cn|en|tc)\//.test(location.pathname)){var d=document.documentElement;d.style.visibility="hidden";setTimeout(function(){d.style.visibility=""},1500);}}catch(e){}})();</script>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>排盘记录 · 观己</title>
<link rel="icon" type="image/svg+xml" href="logo.svg" />
<link rel="stylesheet" href="hd.css" /><script src="theme.js" defer></script>
<style>
  .rec{display:flex;align-items:center;gap:10px;flex-wrap:wrap;background:var(--card);border:1px solid var(--border);border-radius:12px;padding:10px 12px;margin-top:8px}
  .rec .star{border:none;background:none;font-size:18px;cursor:pointer;color:var(--border);padding:2px}
  .rec .star.on{color:#E0A93E}
  .rec .meta{flex:1;min-width:0}
  .rec .n{font-weight:700;font-size:15px}
  .rec .d{font-size:12px;color:var(--sub);margin-top:2px}
  .rec .chips{display:flex;gap:6px;flex-wrap:wrap;justify-content:flex-end}
  .rec .chip{font-size:12px}
  .btn-sm{font-size:12px;padding:5px 10px;border-radius:8px;border:1px solid var(--border);background:var(--card);cursor:pointer;color:var(--sub);text-decoration:none;white-space:nowrap}
  .btn-sm.danger{color:#B3433A;border-color:#E5C5C0}
  .cnt{font-size:12px;color:var(--sub);margin:10px 2px 0}
  .upc{background:var(--surface-2);border:1px solid var(--border);border-radius:12px;padding:10px 14px;margin:10px 0 0}
  .upc-h{font-size:13px;font-weight:700;color:var(--li);margin-bottom:4px}
  .upc-row{display:flex;justify-content:space-between;align-items:center;padding:4px 0;font-size:13.5px;border-top:1px solid #F1E7D3}
  .upc-row:first-of-type{border-top:none}
  .upc-n{color:var(--ink)}
  .upc-self{font-size:11px;color:var(--li);border:1px solid var(--border);border-radius:5px;padding:0 5px;margin-left:4px}
  .upc-d{color:var(--sub);font-variant-numeric:tabular-nums}
  .upc-d.soon{color:var(--li);font-weight:700}
  .upc-date{font-variant-numeric:tabular-nums;opacity:.82}
  .rec .rnote{font-size:12px;color:var(--sub);margin-top:3px;background:var(--surface-2);border:1px solid var(--border);border-radius:7px;padding:2px 7px;display:inline-block;max-width:100%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .btn-sm.noteBtn.has{border-color:var(--gold);color:var(--gold-d);background:var(--surface-2)}
  /* 备注编辑弹窗 */
  .nt-mask{position:fixed;inset:0;z-index:9999;display:flex;align-items:center;justify-content:center;background:rgba(40,32,24,.42);padding:18px}
  .nt-card{width:100%;max-width:420px;background:var(--card);border-radius:16px;box-shadow:0 18px 50px rgba(0,0,0,.26);padding:18px;max-height:88vh;overflow:auto}
  .nt-card h3{margin:0 0 3px;font-size:16px}
  .nt-sub{font-size:12px;color:var(--sub);margin-bottom:10px}
  .nt-ta{width:100%;min-height:90px;font-size:15px;padding:10px 12px;border:1px solid var(--border);border-radius:10px;box-sizing:border-box;font-family:inherit;background:var(--card);color:var(--ink);resize:vertical}
  .nt-img{margin-top:12px}
  .nt-img .lab{font-size:12px;color:var(--sub);margin-bottom:6px}
  .nt-thumb{max-width:100%;max-height:180px;border-radius:10px;border:1px solid var(--border);display:block;margin-top:8px}
  .nt-hint{font-size:12px;color:var(--sub);background:var(--surface-2);border:1px solid var(--border);border-radius:8px;padding:8px 10px;margin-top:12px;line-height:1.5}
  .nt-btns{display:flex;gap:10px;margin-top:16px}
  .nt-btns .btn{flex:1}
  .nt-x{font-size:12px;color:var(--li);cursor:pointer;background:none;border:none;text-decoration:underline;padding:0}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="brand"><img src="logo.svg" class="brandlogo" alt="" />观<span class="li">己</span> · 人类图 <span class="sub">排盘记录</span></div>
  </header>
  <div class="tabs">
    <a class="tab" href="home.html">首页</a>
    <a class="tab" href="index.html">排盘</a>
    <a class="tab" href="mandala.html">流日</a>
    <a class="tab on" href="history.html">记录</a>
    <a class="tab" href="solve.html">反推</a>

<script>
const $=s=>document.querySelector(s);
const esc=s=>String(s??'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
let f='all', q='';

function fmtIn(i){ return `${i.year}-${String(i.month).padStart(2,'0')}-${String(i.day).padStart(2,'0')} ${i.hour}:${String(i.minute).padStart(2,'0')} · ${i.tz}`; }
function match(r){
  if(!q) return true;
  const s=q.toLowerCase();
  if(/^\d{1,2}$/.test(s)) return r.sum.gates.includes(+s)||r.sum.profile.includes(s);
  return (r.name||'').toLowerCase().includes(s)
    || r.sum.type.toLowerCase().includes(s) || (r.sum.typeZh||'').includes(s)
    || r.sum.profile.includes(s) || (r.sum.authority||'').toLowerCase().includes(s)
    || (r.sum.definition||'').includes(s) || (r.sum.channels||[]).some(k=>k.includes(s))
    || (r.note||'').toLowerCase().includes(s)                                            // 备注可搜（人多时凭来历/关系找人）
    || (r.tags||[]).some(t=>tagLblByKey(t).toLowerCase().includes(s)||t.includes(s));   // 关系标记可搜
}
function render(){
  const all=HDStore.all().filter(r=>r&&r.sum&&r.input);   // 防御：残缺记录不参与渲染/搜索，避免整页崩溃
  const passF=r=> f==='all'?true : f==='fav'?r.fav : (r.tags||[]).includes(f);   // 全部/收藏/关系标记
  const rows=all.filter(r=>passF(r)&&match(r));
  const L=(window.HDI18N&&HDI18N.lang)||'zh-Hans';
  // 云端备份状态徽标：开了同步才显示——已上云(绿) / 待同步(灰)
  const cloudBadge=r=>{
    if(!(window.GC&&GC.loggedIn&&GC.loggedIn()&&GC.syncOn&&GC.syncOn())) return '';
    if(GC.isSynced&&GC.isSynced(r.id)) return ` <span class="cloudb on" title="${L==='en'?'Backed up to cloud':L==='zh-Hant'?'已備份到雲端':'已备份到云端'}">☁ ${L==='en'?'Synced':L==='zh-Hant'?'已上雲':'已上云'}</span>`;
    return ` <span class="cloudb" title="${L==='en'?'Will upload on next sync':L==='zh-Hant'?'下次同步時上傳':'下次同步时上传'}">⏳ ${L==='en'?'Pending':L==='zh-Hant'?'待同步':'待同步'}</span>`;
  };
  $('#cnt').textContent=`${rows.length} / ${all.length}`;
  $('#list').innerHTML = rows.map(r=>`
    <div class="rec" data-id="${r.id}">
      <button class="star ${r.fav?'on':''}" title="收藏">${r.fav?'★':'☆'}</button>
      <div class="meta">
        <div class="n">${esc(r.name)||'—'}${r.gender?` <span style="font-weight:400;color:${r.gender==='M'?'#4A7BA6':'#C26A8A'}">${r.gender==='M'?'♂':'♀'}</span>`:''}${r.source==='solve'?` <span class="srcb">反推</span>`:r.source==='celeb'?` <span class="srcb">名人</span>`:''}${(r.tags||[]).map(t=>` <span class="tagb">${esc(tagLblByKey(t))}</span>`).join('')}${cloudBadge(r)}</div>
        <div class="d">${fmtIn(r.input)}</div>
        ${(r.note||r.noteImg)?`<div class="rnote">${r.noteImg?'🖼 ':''}📝 ${esc((r.note||'').slice(0,70))}${(r.note||'').length>70?'…':''}</div>`:''}
      </div>
      <div class="chips">
        <span class="chip"><b>${esc(r.sum.type)}</b></span>
        <span class="chip">${esc(r.sum.profile)}</span>
        <span class="chip">${esc(r.sum.authority)}</span>
      </div>
      <button class="btn-sm noteBtn${(r.note||r.noteImg)?' has':''}" title="${L==='en'?'Note':L==='zh-Hant'?'備註':'备注'}">📝</button>
      <a class="btn-sm" href="dream.html?load=${r.id}" title="${L==='en'?'DreamRave':L==='zh-Hant'?'夢圖':'梦图'}">🌙</a>
      <a class="btn-sm" href="index.html?load=${r.id}">${L==='en'?'Edit':L==='zh-Hant'?'編輯':'编辑'}</a>
      <button class="btn-sm danger del">删除</button>
    </div>`).join('') || (linkRows().length ? '' : '<p class="muted" style="margin-top:16px">暂无记录，去排盘页生成并保存</p>');  // 排盘空但有匹配的合盘/Penta 时不显占位
  renderLinks();
  renderUpcoming();
}
// 近期生日提醒：扫所有记录的出生 月-日，列出未来 30 天内将到的生日（含本人/朋友），方便主动送祝福
function renderUpcoming(){
  const en=window.HDI18N&&HDI18N.lang==='en';
  const now=new Date(), t0=new Date(now.getFullYear(),now.getMonth(),now.getDate()), ty=now.getFullYear();
  const items=[];
  for(const r of HDStore.all()){
    const i=r.input; if(!i||!i.month||!i.day) continue;
    let d=new Date(ty,i.month-1,i.day); if(d<t0) d=new Date(ty+1,i.month-1,i.day);
    const days=Math.round((d-t0)/86400000);
    const mm=String(i.month).padStart(2,'0'), dd=String(i.day).padStart(2,'0');   // 具体生日(月-日)，让「N天后」也看得到日期
    if(days<=30) items.push({name:r.name||'—', days, tags:r.tags||[], mmdd:mm+'-'+dd});
  }
  items.sort((a,b)=>a.days-b.days);
  if(!items.length){ $('#upcoming').innerHTML=''; return; }
  const selfTxt=en?'You':'本人';
  $('#upcoming').innerHTML='<div class="upc"><div class="upc-h">🎂 '+(en?'Upcoming birthdays':'近期生日')+'</div>'
    +items.map(it=>{ const when=it.days===0?(en?'Today 🎉':'就在今天 🎉'):(it.days===1?(en?'Tomorrow':'明天'):(en?('in '+it.days+' days'):(it.days+' 天后')));
      const self=(it.tags||[]).indexOf('self')>=0?(' <span class="upc-self">'+selfTxt+'</span>'):'';
      return '<div class="upc-row"><span class="upc-n">'+esc(it.name)+self+'</span><span class="upc-d'+(it.days<=1?' soon':'')+'"><span class="upc-date">'+it.mmdd+'</span> · '+when+'</span></div>'; }).join('')
    +'</div>';
}
// 合盘 / Penta 链接记录（带徽标，点开进 connect.html 重排）
function linkRows(){
  if(f!=='all') return [];                                  // 链接无收藏/标记，仅「全部」时显示
  let list=(HDStore.linksAll&&HDStore.linksAll())||[];
  if(q){ const s=q.toLowerCase(); list=list.filter(r=>(r.name||'').toLowerCase().includes(s)||(r.members||[]).some(m=>(m.name||'').toLowerCase().includes(s))); }
  return list;
}
function renderLinks(){
  const en=window.HDI18N&&HDI18N.lang==='en';
  const L=(window.HDI18N&&HDI18N.lang)||'zh-Hans';
  const lCloud=r=>{
    if(!(window.GC&&GC.loggedIn&&GC.loggedIn()&&GC.syncOn&&GC.syncOn())) return '';
    if(GC.isLinkSynced&&GC.isLinkSynced(r.id)) return ` <span class="cloudb on" title="${L==='en'?'Backed up to cloud':L==='zh-Hant'?'已備份到雲端':'已备份到云端'}">☁ ${L==='en'?'Synced':L==='zh-Hant'?'已上雲':'已上云'}</span>`;
    return ` <span class="cloudb" title="${L==='en'?'Will upload on next sync':L==='zh-Hant'?'下次同步時上傳':'下次同步时上传'}">⏳ ${L==='en'?'Pending':'待同步'}</span>`;
  };
  const list=linkRows();
  $('#linklist').innerHTML = list.length
    ? `<div class="cnt">${en?'Connections / Pentas':'合盘 / Penta'} · ${list.length}</div>`+list.map(r=>`
      <div class="rec" data-lid="${r.id}">
        <div class="meta">
          <div class="n">${esc(r.name)} <span class="srcb">${r.kind==='penta'?'Penta':(en?'Connection':'合盘')}</span>${lCloud(r)}</div>
          <div class="d">${esc((r.members||[]).map(m=>m.name).join(' · '))}</div>
        </div>
        <a class="btn-sm" href="connect.html?openLink=${r.id}">${en?'Open':'打开'}</a>
        <button class="btn-sm danger ldel">${en?'Delete':'删除'}</button>
      </div>`).join('')
    : '';
}
$('#linklist').onclick=e=>{
  const row=e.target.closest('.rec'); if(!row)return;
  if(e.target.closest('.ldel')){ const I=window.HDI18N, m='确定删除？';
    const msg=I&&I.lang==='en'?(I.EN[m]||m):I&&I.lang==='zh-Hant'?I.s2t(m):m;
    if(confirm(msg)){ HDStore.removeLink(row.dataset.lid); render(); } }
};
$('#q').oninput=()=>{q=$('#q').value.trim();render();};
$('#filter').onclick=e=>{const t=e.target.closest('[data-f]');if(!t)return;f=t.dataset.f;for(const x of $('#filter').children)x.classList.toggle('on',x===t);render();};

// ── 备份/恢复（防丢失安全网；也是换设备/换浏览器/换域名的迁移手段）──
const I=window.HDI18N, EN=I&&I.lang==='en';
const tr=zh=>EN?(I.EN[zh]||zh):I&&I.lang==='zh-Hant'?I.s2t(zh):zh;
// 关系标记本地化 + 加入筛选栏（便于后端按分群管理）
const HDTAGS=(window.HDStore&&HDStore.TAGS)||[];
const tagLbl=o=>EN?o.en:(I&&I.lang==='zh-Hant'?o.tw:o.zh);
const tagLblByKey=k=>{const o=HDTAGS.find(x=>x.k===k);return o?tagLbl(o):k;};
(function buildTagFilters(){ const bar=$('#filter'); const sp=bar.querySelector('span[style*="flex"]');
  HDTAGS.forEach(o=>{ const el=document.createElement('span'); el.className='tab'; el.dataset.f=o.k; el.textContent=tagLbl(o); bar.insertBefore(el, sp); }); })();
(function(){ const b=$('#celebBtn'); if(b) b.textContent=EN?'🌟 Celebrities':(I&&I.lang==='zh-Hant'?'🌟 名人盤':'🌟 名人盘'); })();
$('#exportBtn').onclick=()=>{
  const blob=new Blob([HDStore.exportJSON()],{type:'application/json'});
  const a=document.createElement('a');
  const d=new Date(), p=n=>String(n).padStart(2,'0');
  a.href=URL.createObjectURL(blob);
  a.download=`guanji-humandesign-charts-export-${d.getFullYear()}${p(d.getMonth()+1)}${p(d.getDate())}.json`;
  a.click(); URL.revokeObjectURL(a.href);
};
$('#importBtn').onclick=()=>$('#importFile').click();
$('#importFile').onchange=async e=>{
  const file=e.target.files[0]; if(!file)return;
  try{
    const r=HDStore.importJSON(await file.text());
    alert(tr('已恢复')+`：+${r.added} ${tr('新增')} / ${r.updated} ${tr('更新')}${r.links?` · +${r.links} ${EN?'links':'合盘/Penta'}`:''}（${tr('共')} ${r.total}）`);
    render();
  }catch(err){ alert(err&&err.message==='write-failed' ? (EN?'Storage write failed (full / private mode). Nothing saved — keep your backup file.':'存储写入失败（空间不足/隐私模式），数据未保存，请勿删除备份文件') : tr('导入失败：文件格式不正确')); }
  e.target.value='';
};
// 申请持久化存储 + 风险提示（未授予时告知用户做备份）
(async()=>{
  const ok=await HDStore.requestPersist();
  $('#safetynote').textContent = ok
    ? tr('ⓘ 记录保存在本机浏览器，已申请持久化保护。建议定期「导出备份」以防换设备/清缓存丢失。')
    : tr('⚠ 记录仅保存在本机浏览器，换设备、清缓存或长期不访问可能丢失。请定期「导出备份」，换机后用「导入恢复」。');
})();
$('#list').onclick=e=>{
  const row=e.target.closest('.rec'); if(!row)return; const id=row.dataset.id;
  if(e.target.closest('.star')){ HDStore.toggleFav(id); render(); }
  else if(e.target.closest('.noteBtn')){ openNote(id); }
  else if(e.target.closest('.del')){
    const I=window.HDI18N, m='确定删除？';
    const msg=I&&I.lang==='en'?(I.EN[m]||m):I&&I.lang==='zh-Hant'?I.s2t(m):m;
    if(confirm(msg)){ HDStore.remove(id); render(); }
  }
};

// 上传前客户端压缩：缩到 ≤1600px、转 JPEG 0.85 —— 大 PNG(如 ChatGPT 海报常 2~5MB+)避免超 5MB 上限/上传慢/失败
function compressImg(file){
  return new Promise(function(resolve){
    try{
      if(!file || !/^image\//.test(file.type)) return resolve(file);
      var img=new Image(), url=URL.createObjectURL(file);
      img.onload=function(){ try{ URL.revokeObjectURL(url); }catch(e){}
        var max=1600, w=img.naturalWidth||img.width, h=img.naturalHeight||img.height;
        if(w>max||h>max){ var s=Math.min(max/w,max/h); w=Math.round(w*s); h=Math.round(h*s); }
        var cv=document.createElement('canvas'); cv.width=w; cv.height=h;
        var cx=cv.getContext('2d'); cx.fillStyle='#fff'; cx.fillRect(0,0,w,h); cx.drawImage(img,0,0,w,h);  // 白底：JPEG 无透明
        cv.toBlob(function(b){ resolve(b && b.size<file.size ? new File([b],(file.name||'img').replace(/\.[^.]+$/,'')+'.jpg',{type:'image/jpeg'}) : file); },'image/jpeg',0.85);
      };
      img.onerror=function(){ try{ URL.revokeObjectURL(url); }catch(e){} resolve(file); };
      img.src=url;
    }catch(e){ resolve(file); }
  });
}
// ── 备注编辑（文字人人可用·随记录云同步；图片仅登录并开同步的用户·存 PocketBase）──
function openNote(id){
  const rec=HDStore.get(id); if(!rec) return;
  const t=(zh,en,tw)=>EN?en:(I&&I.lang==='zh-Hant'?(tw||(I.s2t?I.s2t(zh):zh)):zh);
  const canImg=!!(window.GC&&GC.loggedIn&&GC.loggedIn()&&GC.syncOn&&GC.syncOn());
  const mask=document.createElement('div'); mask.className='nt-mask';
  mask.innerHTML=
    '<div class="nt-card">'
    +'<h3>'+t('备注','Note','備註')+' · '+esc(rec.name||t('未命名','Unnamed','未命名'))+'</h3>'
    +'<div class="nt-sub">'+t('给这个人记点什么，方便人多时查找（如：老王的朋友、某活动认识）','Jot something down to find this person later (e.g. Wang’s friend, met at an event)','給這個人記點什麼，方便人多時查找（如：老王的朋友、某活動認識）')+'</div>'
    +'<textarea class="nt-ta" id="ntTa" maxlength="2000" placeholder="'+t('写点备注…','Write a note…','寫點備註…')+'"></textarea>'
    +'<div class="nt-img">'
      +'<div class="lab">'+t('图片（可选）','Image (optional)','圖片（可選）')+'</div>'
      +(canImg
        ? '<input type="file" id="ntFile" accept="image/*"><div id="ntThumbWrap"></div>'
        : '<div class="nt-hint">'+t('登录并开启云同步后可上传图片（图片存云端，不占本机空间）','Sign in and turn on cloud sync to attach an image (stored in the cloud).','登入並開啟雲同步後可上傳圖片（圖片存雲端，不佔本機空間）')+'</div>')
    +'</div>'
    +'<div class="nt-btns"><button class="btn ghost" id="ntCancel">'+t('取消','Cancel','取消')+'</button><button class="btn" id="ntSave">'+t('保存','Save','保存')+'</button></div>'
    +'<div id="ntMsg" class="nt-sub" style="margin-top:8px"></div>'
    +'</div>';
  document.body.appendChild(mask);
  const $$=s=>mask.querySelector(s);
  $$('#ntTa').value=rec.note||'';
  let pickedFile=null, removeExisting=false;
  const msg=(s)=>{ $$('#ntMsg').textContent=s||''; };
  const close=()=>{ try{mask.remove();}catch(e){} };
  mask.addEventListener('click',e=>{ if(e.target===mask) close(); });
  $$('#ntCancel').onclick=close;
  // 已有云端图片 → 拉取可访问 URL 显示缩略图 + 「移除图片」
  async function showThumb(){
    const w=$$('#ntThumbWrap'); if(!w) return; w.innerHTML='';
    if(removeExisting) return;
    if(rec.noteImg && canImg){
      w.innerHTML='<div class="nt-sub">'+t('载入图片…','Loading image…','載入圖片…')+'</div>';
      try{ const url=await GC.noteImgUrl(rec.id, rec.noteImg);
        w.innerHTML='<img class="nt-thumb" src="'+esc(url)+'" alt=""><div style="margin-top:6px"><button class="nt-x" id="ntRmImg">'+t('移除图片','Remove image','移除圖片')+'</button></div>';
        const rm=$$('#ntRmImg'); if(rm) rm.onclick=()=>{ removeExisting=true; pickedFile=null; if($$('#ntFile'))$$('#ntFile').value=''; showThumb(); };
      }catch(e){ w.innerHTML='<div class="nt-sub">'+t('图片载入失败','Image failed to load','圖片載入失敗')+'</div>'; }
    }
  }
  showThumb();
  if(canImg){ const f=$$('#ntFile'); if(f) f.onchange=()=>{ pickedFile=f.files&&f.files[0]||null; removeExisting=false;
    const w=$$('#ntThumbWrap'); if(pickedFile&&w){ const u=URL.createObjectURL(pickedFile); w.innerHTML='<img class="nt-thumb" src="'+u+'" alt="">'; } }; }
  $$('#ntSave').onclick=async()=>{
    const text=$$('#ntTa').value.trim();
    $$('#ntSave').disabled=true;
    try{
      if(canImg && pickedFile){ msg(t('处理图片…','Processing image…','處理圖片…')); const up=await compressImg(pickedFile);
        msg(t('上传图片…','Uploading image…','上傳圖片…')); const fn=await GC.uploadNoteImg(rec.id, up); HDStore.setNote(id, text, fn); }
      else if(canImg && removeExisting){ msg(t('移除图片…','Removing image…','移除圖片…')); try{ await GC.removeNoteImg(rec.id); }catch(e){} HDStore.setNote(id, text, ''); }
      else { HDStore.setNote(id, text); }   // 仅文字（noteImg 不变）
      close(); render();
    }catch(e){ $$('#ntSave').disabled=false; msg((EN?'Save failed: ':'保存失败：')+((e&&e.message)||'')); }
  };
}

window.HDRerender=render;   // 云同步拉回后让 hd-account.js 触发本页重渲染
render();
</script>
</body>
</html>

<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>命盘记录 · 观己</title>
<link rel="icon" type="image/svg+xml" href="logo.svg" />
<link rel="stylesheet" href="hd.css" />
<style>
  .rec{display:flex;align-items:center;gap:10px;background:#fff;border:1px solid #EDE4D4;border-radius:12px;padding:10px 12px;margin-top:8px}
  .rec .star{border:none;background:none;font-size:18px;cursor:pointer;color:#D8CFC0;padding:2px}
  .rec .star.on{color:#E0A93E}
  .rec .meta{flex:1;min-width:0}
  .rec .n{font-weight:700;font-size:15px}
  .rec .d{font-size:12px;color:var(--sub);margin-top:2px}
  .rec .chips{display:flex;gap:6px;flex-wrap:wrap;justify-content:flex-end}
  .rec .chip{font-size:12px}
  .btn-sm{font-size:12px;padding:5px 10px;border-radius:8px;border:1px solid #D8CFC0;background:#fff;cursor:pointer;color:#6B5B43;text-decoration:none;white-space:nowrap}
  .btn-sm.danger{color:#B3433A;border-color:#E5C5C0}
  .cnt{font-size:12px;color:var(--sub);margin:10px 2px 0}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="brand"><img src="logo.svg" class="brandlogo" alt="" />观<span class="li">己</span> · 人类图 <span class="sub">命盘记录</span></div>
  </header>
  <div class="tabs">
    <a class="tab" href="index.html?home=1">首页</a>
    <a class="tab" href="index.html">排盘</a>
    <a class="tab" href="mandala.html">流日</a>
    <a class="tab on" href="history.html">记录</a>
    <a class="tab" href="solve.html">反推</a>
    <a class="tab" href="connect.html">合盘</a>
    <a class="tab" href="learn.html">学习 · 知识库</a>
    <a class="tab" href="celebs.html">名人</a>
  </div>

  <div id="hd-acct"></div>
  <input id="q" class="kb-search" placeholder="搜索：姓名 / 闸门号 / 类型 / 角色 / 通道…" />
  <div class="tabs" id="filter">
    <span class="tab on" data-f="all">全部</span>
    <span class="tab" data-f="fav">★ 收藏</span>
    <span style="flex:1"></span>
    <button class="btn-sm" id="exportBtn" title="导出备份">⤓ 导出备份</button>
    <button class="btn-sm" id="importBtn" title="导入恢复">⤒ 导入恢复</button>
    <input type="file" id="importFile" accept="application/json,.json" hidden />
  </div>
  <p class="muted" id="safetynote" style="margin:8px 2px 0;font-size:12px;line-height:1.6"></p>
  <div class="cnt" id="cnt"></div>
  <div id="list"></div>
  <div id="linklist"></div>
</div>

<script src="hd-store.js"></script>
<script src="i18n.js"></script>
<script src="nickpool.js"></script>
<script src="hd-cloud.js"></script>
<script src="hd-account.js"></script>
<script>
const $=s=>document.querySelector(s);
const esc=s=>String(s??'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
let f='all', q='';

function fmtIn(i){ return `${i.year}-${String(i.month).padStart(2,'0')}-${String(i.day).padStart(2,'0')} ${i.hour}:${String(i.minute).padStart(2,'0')} · ${i.tz}`; }
function match(r){
  if(!q) return true;
  const s=q.toLowerCase();
  if(/^\d{1,2}$/.test(s)) return r.sum.gates.includes(+s)||r.sum.profile.includes(s);
  return (r.name||'').toLowerCase().includes(s)
    || r.sum.type.toLowerCase().includes(s) || (r.sum.typeZh||'').includes(s)
    || r.sum.profile.includes(s) || (r.sum.authority||'').toLowerCase().includes(s)
    || (r.sum.definition||'').includes(s) || (r.sum.channels||[]).some(k=>k.includes(s));
}
function render(){
  const all=HDStore.all();
  const rows=all.filter(r=>(f==='all'||r.fav)&&match(r));
  $('#cnt').textContent=`${rows.length} / ${all.length}`;
  $('#list').innerHTML = rows.map(r=>`
    <div class="rec" data-id="${r.id}">
      <button class="star ${r.fav?'on':''}" title="收藏">${r.fav?'★':'☆'}</button>
      <div class="meta">
        <div class="n">${esc(r.name)||'—'}${r.gender?` <span style="font-weight:400;color:${r.gender==='M'?'#4A7BA6':'#C26A8A'}">${r.gender==='M'?'♂':'♀'}</span>`:''}${r.source==='solve'?` <span class="srcb">反推</span>`:r.source==='celeb'?` <span class="srcb">名人</span>`:''}</div>
        <div class="d">${fmtIn(r.input)}</div>
      </div>
      <div class="chips">
        <span class="chip"><b>${esc(r.sum.type)}</b></span>
        <span class="chip">${esc(r.sum.profile)}</span>
        <span class="chip">${esc(r.sum.authority)}</span>
      </div>
      <a class="btn-sm" href="index.html?load=${r.id}">打开</a>
      <button class="btn-sm danger del">删除</button>
    </div>`).join('') || (linkRows().length ? '' : '<p class="muted" style="margin-top:16px">暂无记录，去排盘页生成并保存</p>');  // 命盘空但有匹配的合盘/Penta 时不显占位
  renderLinks();
}
// 合盘 / Penta 链接记录（带徽标，点开进 connect.html 重排）
function linkRows(){
  if(f==='fav') return [];                                  // 链接无收藏，收藏筛选时不计
  let list=(HDStore.linksAll&&HDStore.linksAll())||[];
  if(q){ const s=q.toLowerCase(); list=list.filter(r=>(r.name||'').toLowerCase().includes(s)||(r.members||[]).some(m=>(m.name||'').toLowerCase().includes(s))); }
  return list;
}
function renderLinks(){
  const en=window.HDI18N&&HDI18N.lang==='en';
  const list=linkRows();
  $('#linklist').innerHTML = list.length
    ? `<div class="cnt">${en?'Connections / Pentas':'合盘 / Penta'} · ${list.length}</div>`+list.map(r=>`
      <div class="rec" data-lid="${r.id}">
        <div class="meta">
          <div class="n">${esc(r.name)} <span class="srcb">${r.kind==='penta'?'Penta':(en?'Connection':'合盘')}</span></div>
          <div class="d">${esc((r.members||[]).map(m=>m.name).join(' · '))}</div>
        </div>
        <a class="btn-sm" href="connect.html?openLink=${r.id}">${en?'Open':'打开'}</a>
        <button class="btn-sm danger ldel">${en?'Delete':'删除'}</button>
      </div>`).join('')
    : '';
}
$('#linklist').onclick=e=>{
  const row=e.target.closest('.rec'); if(!row)return;
  if(e.target.closest('.ldel')){ const I=window.HDI18N, m='确定删除？';
    const msg=I&&I.lang==='en'?(I.EN[m]||m):I&&I.lang==='zh-Hant'?I.s2t(m):m;
    if(confirm(msg)){ HDStore.removeLink(row.dataset.lid); render(); } }
};
$('#q').oninput=()=>{q=$('#q').value.trim();render();};
$('#filter').onclick=e=>{const t=e.target.closest('[data-f]');if(!t)return;f=t.dataset.f;for(const x of $('#filter').children)x.classList.toggle('on',x===t);render();};

// ── 备份/恢复（防丢失安全网；也是换设备/换浏览器/换域名的迁移手段）──
const I=window.HDI18N, EN=I&&I.lang==='en';
const tr=zh=>EN?(I.EN[zh]||zh):I&&I.lang==='zh-Hant'?I.s2t(zh):zh;
$('#exportBtn').onclick=()=>{
  const blob=new Blob([HDStore.exportJSON()],{type:'application/json'});
  const a=document.createElement('a');
  const d=new Date(), p=n=>String(n).padStart(2,'0');
  a.href=URL.createObjectURL(blob);
  a.download=`guanji-charts-${d.getFullYear()}${p(d.getMonth()+1)}${p(d.getDate())}.json`;
  a.click(); URL.revokeObjectURL(a.href);
};
$('#importBtn').onclick=()=>$('#importFile').click();
$('#importFile').onchange=async e=>{
  const file=e.target.files[0]; if(!file)return;
  try{
    const r=HDStore.importJSON(await file.text());
    alert(tr('已恢复')+`：+${r.added} ${tr('新增')} / ${r.updated} ${tr('更新')}${r.links?` · +${r.links} ${EN?'links':'合盘/Penta'}`:''}（${tr('共')} ${r.total}）`);
    render();
  }catch(err){ alert(err&&err.message==='write-failed' ? (EN?'Storage write failed (full / private mode). Nothing saved — keep your backup file.':'存储写入失败（空间不足/隐私模式），数据未保存，请勿删除备份文件') : tr('导入失败：文件格式不正确')); }
  e.target.value='';
};
// 申请持久化存储 + 风险提示（未授予时告知用户做备份）
(async()=>{
  const ok=await HDStore.requestPersist();
  $('#safetynote').textContent = ok
    ? tr('ⓘ 记录保存在本机浏览器，已申请持久化保护。建议定期「导出备份」以防换设备/清缓存丢失。')
    : tr('⚠ 记录仅保存在本机浏览器，换设备、清缓存或长期不访问可能丢失。请定期「导出备份」，换机后用「导入恢复」。');
})();
$('#list').onclick=e=>{
  const row=e.target.closest('.rec'); if(!row)return; const id=row.dataset.id;
  if(e.target.closest('.star')){ HDStore.toggleFav(id); render(); }
  else if(e.target.closest('.del')){
    const I=window.HDI18N, m='确定删除？';
    const msg=I&&I.lang==='en'?(I.EN[m]||m):I&&I.lang==='zh-Hant'?I.s2t(m):m;
    if(confirm(msg)){ HDStore.remove(id); render(); }
  }
};
window.HDRerender=render;   // 云同步拉回后让 hd-account.js 触发本页重渲染
render();
</script>
</body>
</html>

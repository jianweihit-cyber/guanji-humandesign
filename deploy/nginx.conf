# 观己·人类图 nginx v2 — 预压缩 + 限流 + 安全头（2026-06-12 性能包）
# 坑位备忘：① Fly 代理带 Via 头，无 gzip_proxied any 时 nginx gzip 全部失效（含 gzip_static）
#          ② location 内出现任意 add_header 会切断 server 级安全头继承 → 全部收口到 server 级 map
#          ③ $binary_remote_addr 必须先经 real_ip 还原，否则全站用户共享 Fly 代理一个限流桶

limit_req_zone $binary_remote_addr zone=req:10m rate=30r/s;

map $uri $cc {
  ~*\.(wasm|data)$            "public, max-age=31536000, immutable";
  ~*\.(html|js|css|json|svg)$ "no-cache";
  default                     "public, max-age=3600";
}

server {
  listen 8080;
  root /usr/share/nginx/html;
  absolute_redirect off;   # 302 用相对路径，避免拼出内部端口 8080

  # 恢复真实客户端 IP（8080 仅 Fly 代理可达，可信）
  set_real_ip_from 0.0.0.0/0;
  real_ip_header Fly-Client-IP;

  # 限流：30r/s/IP，burst 80 覆盖首访 ~20 个资产并发；防 2MB 星历被脚本刷流量
  limit_req zone=req burst=80 nodelay;
  limit_req_status 429;
  client_max_body_size 16k;

  # 压缩：构建期 gzip -9 预压缩(.gz) 优先命中，零运行时 CPU；动态 gzip 兜底
  gzip_static on;
  gzip on;
  gzip_proxied any;
  gzip_vary on;
  gzip_types text/css application/javascript text/javascript application/json application/wasm image/svg+xml application/octet-stream;
  gzip_min_length 1024;

  # 缓存策略统一收口（html/js/css/json no-cache+ETag 协商，杜绝新HTML旧JS错配；wasm/data 一年 immutable）
  add_header Cache-Control $cc always;

  # 安全头（纯静态站零破坏 5 项；CSP 需先改造内联 handler，暂缓）
  add_header Strict-Transport-Security "max-age=15552000" always;
  add_header X-Content-Type-Options nosniff always;
  add_header X-Frame-Options DENY always;
  add_header Referrer-Policy strict-origin-when-cross-origin always;
  add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

  # 首页跳排盘
  location = / { return 302 /web/index.html; }
  location / { try_files $uri $uri/ =404; }
}

server {
  listen 8080;
  root /usr/share/nginx/html;
  absolute_redirect off;   # 302 用相对路径，避免拼出内部端口 8080

  gzip on;
  gzip_types text/css application/javascript text/javascript application/json application/wasm image/svg+xml;
  gzip_min_length 1024;

  # 首页跳排盘
  location = / { return 302 /web/index.html; }

  # wasm / 星历数据：长缓存（文件名不变内容不变）
  location ~* \.(wasm|data)$ {
    add_header Cache-Control "public, max-age=31536000, immutable";
    try_files $uri =404;
  }
  # html 不缓存（改版即时生效）
  location ~* \.html$ {
    add_header Cache-Control "no-cache";
    try_files $uri =404;
  }
  location / { try_files $uri $uri/ =404; }
}
